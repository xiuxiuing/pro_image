<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% if template_id %}编辑规则模板{% else %}新建规则模板{% endif %} - 商品分析平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --panel: rgba(255,255,255,.94);
            --border: #dbe3ef;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-2: #1d4ed8;
            --soft: #eef4ff;
            --danger: #b91c1c;
            --danger-bg: #fef2f2;
            --radius: 18px;
            --shadow: 0 10px 30px rgba(15, 23, 42, .06);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .wrap {
            max-width: 1540px;
            margin: 0 auto;
            padding: 28px 20px 48px;
        }
        .top {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .back {
            color: #475569;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        .back:hover { color: #000; }
        h1 {
            margin: 10px 0 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            line-height: 1.05;
        }
        .sub {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.65;
            max-width: 860px;
        }
        .layout {
            display: grid;
            grid-template-columns: 290px minmax(560px, 1fr) 300px;
            gap: 18px;
            align-items: stretch;
        }
        /* 宽屏：三栏外框等高（以视口为参照，内容在栏内滚动） */
        @media (min-width: 1241px) {
            .layout {
                height: calc(100vh - 140px);
                min-height: 420px;
                max-height: calc(100vh - 100px);
            }
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }
        .panel-head {
            padding: 18px 18px 14px;
            border-bottom: 1px solid #edf2f7;
        }
        .panel-head h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
        }
        .panel-head p {
            margin: 6px 0 0;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }
        .panel-body {
            padding: 16px 18px 18px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 左栏：顶部固定 + 类目树占满剩余高度并滚动 */
        .panel-body--left .category-tree-scroll {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            margin-top: 4px;
        }
        .panel-body--left .category-tree-scroll .tree {
            flex: 1;
            min-height: 0;
            max-height: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 4px;
        }
        /* 中栏：规则卡片区滚动，底部按钮固定 */
        .panel-body--middle .panel-draft-top {
            flex-shrink: 0;
        }
        .panel-body--middle .metrics-scroll-wrap {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -4px 0 0;
            padding-right: 4px;
        }
        .panel-body--middle .footer-actions {
            flex-shrink: 0;
            margin-top: 12px;
        }
        /* 右栏：列表区滚动，提交/取消贴底 */
        .panel-body--right .rule-groups-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .panel-body--right .footer-actions {
            flex-shrink: 0;
            margin-top: auto;
            padding-top: 12px;
        }
        .field { margin-bottom: 14px; }
        .label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 7px;
            color: #334155;
        }
        .label-req { color: #b91c1c; font-weight: 800; }
        input[type="text"], input[type="number"], .search, textarea {
            width: 100%;
            border: 1px solid #d9e2ef;
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            font-size: 14px;
            background: #fff;
            color: var(--text);
        }
        textarea { resize: vertical; }
        .btn, .btn-mini {
            border: none;
            border-radius: 12px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .btn {
            padding: 12px 18px;
            font-size: 14px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-2); }
        .btn-soft {
            background: #f1f5f9;
            color: #334155;
        }
        .btn-soft:hover { background: #e2e8f0; }
        .btn-outline {
            background: #fff;
            color: #334155;
            border: 1px solid #d9e2ef;
        }
        .btn-outline:hover { background: #f8fafc; }
        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #fecaca;
        }
        .stack { display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .bucket-tags-wrap { margin-bottom: 10px; }
        .bucket-tags-hint {
            font-size: 11px;
            color: #64748b;
            margin: 0 0 6px;
            line-height: 1.45;
        }
        .bucket-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .bucket-tag {
            padding: 3px 9px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 999px;
            border: 1px solid #dbe3ef;
            background: #fff;
            color: #334155;
            cursor: pointer;
            line-height: 1.3;
        }
        .bucket-tag:hover { border-color: var(--primary); color: #1d4ed8; background: #f8fbff; }
        .bucket-tag.active { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
        .tree-toolbar {
            display: flex;
            flex-direction: row;
            gap: 6px;
            align-items: stretch;
            margin-bottom: 8px;
        }
        .tree-toolbar .tree-toolbar-btn {
            flex: 1;
            min-width: 0;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.3;
            border-radius: 8px;
            white-space: nowrap;
        }
        .tree {
            padding-right: 4px;
        }
        .tree-block { margin-bottom: 12px; }
        .node {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 30px;
            font-size: 13px;
        }
        .toggle-btn {
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
            line-height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 18px;
        }
        .toggle-btn:hover { color: #0f172a; }
        .toggle-spacer {
            width: 18px;
            height: 18px;
            flex: 0 0 18px;
        }
        .node input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }
        .node.l1 { font-weight: 700; }
        .node.l2 { margin-left: 20px; color: #334155; }
        .node.l3 { margin-left: 40px; color: #475569; }
        .node.disabled { opacity: .45; }
        .node-note {
            margin-left: auto;
            font-size: 11px;
            color: #94a3b8;
        }
        .summary {
            background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
            border: 1px solid #dbeafe;
            border-radius: 14px;
            padding: 14px 15px;
            margin-bottom: 16px;
        }
        .summary-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .summary-text {
            font-size: 12px;
            color: #475569;
            line-height: 1.6;
        }
        .metric-card {
            border: 1px solid #dde6f2;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .metric-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px 10px;
        }
        .metric-name {
            font-size: 15px;
            font-weight: 800;
        }
        .metric-help {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
            padding: 0 16px 12px;
        }
        .metric-body {
            border-top: 1px solid #edf2f7;
            padding: 14px 16px 16px;
            background: #fff;
        }
        .switch {
            position: relative;
            width: 48px;
            height: 28px;
            display: inline-block;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: #cbd5e1;
            transition: .2s;
            cursor: pointer;
        }
        .slider:before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background: #fff;
            transition: .2s;
            box-shadow: 0 1px 3px rgba(0,0,0,.25);
        }
        .switch input:checked + .slider {
            background: var(--primary);
        }
        .switch input:checked + .slider:before {
            transform: translateX(20px);
        }
        .metric-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .metric-inline-note {
            margin-top: 7px;
            font-size: 11px;
            color: #94a3b8;
        }
        .metric-pct-input {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .metric-pct-input .metric-rel { max-width: 140px; }
        .metric-pct-suffix {
            font-size: 14px;
            font-weight: 700;
            color: #64748b;
        }
        .syn-list { display: flex; flex-direction: column; gap: 8px; }
        .syn-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .syn-empty {
            color: #94a3b8;
            font-size: 12px;
            padding: 8px 0 2px;
        }
        .side-card {
            border: 1px solid #dde6f2;
            border-radius: 16px;
            padding: 14px;
            background: #fff;
            margin-bottom: 12px;
        }
        .side-card h3 {
            margin: 0 0 8px;
            font-size: 15px;
            font-weight: 800;
        }
        .side-meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .side-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
        }
        .side-table th,
        .side-table td {
            text-align: left;
            font-size: 11px;
            padding: 5px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .side-table th {
            color: #94a3b8;
            font-weight: 700;
        }
        .side-actions {
            display: flex;
            gap: 8px;
        }
        .side-actions button {
            flex: 1;
            padding: 9px 10px;
        }
        .empty {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
            padding: 10px 2px;
        }
        .footer-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .notice {
            margin-top: 10px;
            font-size: 12px;
            color: #475569;
            line-height: 1.6;
        }
        @media (max-width: 1240px) {
            .layout {
                grid-template-columns: 1fr;
                height: auto !important;
                max-height: none !important;
                min-height: 0 !important;
            }
            .panel { overflow: visible; }
            .panel-body { overflow: visible; height: auto; }
            .panel-body--left .category-tree-scroll .tree {
                max-height: 520px;
                overflow-y: auto;
            }
            .panel-body--middle .metrics-scroll-wrap { overflow: visible; max-height: none; }
            .panel-body--right .rule-groups-scroll { overflow: visible; max-height: none; }
        }
        @media (max-width: 720px) {
            .metric-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="top">
            <div>
                <a class="back" href="/match-rules">← 返回规则列表</a>
                <h1>{% if template_id %}编辑规则模板{% else %}新建规则模板{% endif %}</h1>
            </div>
        </div>

        <div class="layout">
            <section class="panel">
                <div class="panel-head">
                    <h2>类目导入与选择</h2>
                </div>
                <div class="panel-body panel-body--left">
                    <div class="stack">
                        <div class="btn-row">
                            <label class="btn btn-primary" style="position:relative; overflow:hidden;">
                                上传类目文件
                                <input id="category-file-input" type="file" accept=".xlsx,.xls" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
                            </label>
                            <a class="btn btn-outline" href="/api/rule-category-template">下载模板</a>
                        </div>
                        <div class="notice" id="category-source-note">尚未上传类目文件。</div>
                    </div>

                    <div class="bucket-tags-wrap">
                        <p class="bucket-tags-hint">快捷选类：按业务类型归组一级类目，点击即可勾选/取消该组下全部可选的三级（已占用在其它规则组的除外）。</p>
                        <div id="bucket-tags" class="bucket-tags" role="group" aria-label="一级类目快捷标签"></div>
                    </div>
                    <div class="tree-toolbar" role="toolbar" aria-label="类目树操作">
                        <button type="button" class="btn-mini btn-outline tree-toolbar-btn" id="expand-toggle-btn">全部展开</button>
                        <button type="button" class="btn-mini btn-outline tree-toolbar-btn" id="select-toggle-btn">全选</button>
                    </div>
                    <div class="category-tree-scroll">
                        <div id="category-tree" class="tree"></div>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>当前规则组</h2>
                </div>
                <div class="panel-body panel-body--middle">
                    <div class="panel-draft-top">
                        <div class="field">
                            <label class="label" for="template-name">模板名称 <span class="label-req" title="必填">*</span></label>
                            <input id="template-name" name="template_name" type="text" required autocomplete="off" placeholder="例如：商品后验规则（饮料 / 生鲜）" value="{{ template_name or '' }}" aria-required="true">
                        </div>
                        <div class="field">
                            <label class="label">模板说明</label>
                            <input id="template-desc" type="text" placeholder="可选，给团队看的说明文字">
                        </div>

                        <div class="summary">
                            <div class="summary-title" id="draft-summary-title">尚未选择三级类目</div>
                            <div class="summary-text" id="draft-summary-text">左侧选择三级类目后，在这里配置规则。</div>
                        </div>
                    </div>

                    <div class="metrics-scroll-wrap">
                        <div id="metrics-root"></div>
                    </div>

                    <div class="footer-actions">
                        <button type="button" class="btn btn-primary" id="save-group-btn">保存当前规则组</button>
                        <button type="button" class="btn btn-soft" id="clear-draft-btn">清空当前编辑</button>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <h2>已保存规则组</h2>
                </div>
                <div class="panel-body panel-body--right">
                    <div id="rule-groups-list" class="rule-groups-scroll"></div>
                    <div class="footer-actions">
                        <button type="button" class="btn btn-primary" id="submit-template-btn" style="flex:1;">提交模板</button>
                        <a class="btn btn-soft" href="/match-rules" style="text-decoration:none; text-align:center;">取消</a>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const TEMPLATE_ID = {{ template_id|int }};
        const METRICS = [
            { key: 'cat3', title: '三级类目一致', type: 'bool', help: '开启后，竞店候选商品的三级类目必须与主店商品三级类目一致；关闭后允许跨三级类目候选继续由其他维度判断。', note: '建议默认开启，只有明确需要放宽跨三级类目匹配时再关闭。' },
            { key: 'net', title: '单件净含量', type: 'rel', help: '按 AI 提取的净含量比较；仅在双方都能解析且单位一致时才计算相对偏差。', defaultValue: 20, step: 0.1, note: '填写相对主店可接受的偏差百分比，例如 20 表示约 ±20%。' },
            { key: 'sell', title: '售卖数量', type: 'diff', help: '从售卖数量文本中取第一个数字比较；差值超过阈值则拦截。', defaultValue: 0, step: 0.1, note: '为 0 时，数量须完全一致。' },
            { key: 'pack', title: '包装单位', type: 'syn', help: '例如“听 / 罐”“瓶 / 支”可配置为同义词组。', note: '仅在双方都有值时比较。' },
            { key: 'color', title: '颜色', type: 'syn', help: '多色会先拆分再排序比较；同义词可消除“乳白≈白”这类写法差异。', note: '建议只在该品类颜色信息稳定时启用。' },
            { key: 'size', title: '尺寸', type: 'rel', help: '从尺寸文本里提取 mm / cm / m 比较；只在双方都能解析时计算相对偏差。', defaultValue: 12.5, step: 0.1, note: '填写相对主店尺寸可接受的偏差百分比，例如 12.5 表示约 ±12.5%。' },
            { key: 'model', title: '型号', type: 'syn', help: '按型号文本比较，可用同义词组消除型号别名或缩写差异。', note: '适合型号特征明确的商品。' },
        ];

        let categoryTree = { items: [], l1_count: 0, l3_count: 0 };
        let categoryPathMap = new Map();
        let bucketTagList = [];
        let selectedKeys = new Set();
        let ruleGroups = [];
        let editingIndex = null;
        let expandedL1 = new Set();
        let expandedL2 = new Set();

        function pathKey(path) {
            return [path.l1 || '', path.l2 || '', path.l3 || ''].join('||');
        }

        function uniqueList(values) {
            const out = [];
            const seen = new Set();
            (values || []).forEach((v) => {
                const s = String(v || '').trim();
                if (!s || seen.has(s)) return;
                seen.add(s);
                out.push(s);
            });
            return out;
        }

        function buildTreeFromPaths(paths) {
            const l1Map = new Map();
            (paths || []).forEach((row) => {
                const l1 = String((row && row.l1) || '').trim() || '未分类一级类目';
                const l2 = String((row && row.l2) || '').trim() || '未分类二级类目';
                const l3 = String((row && row.l3) || '').trim();
                if (!l3) return;
                if (!l1Map.has(l1)) l1Map.set(l1, { name: l1, l3_count: 0, childrenMap: new Map() });
                const l1Node = l1Map.get(l1);
                if (!l1Node.childrenMap.has(l2)) l1Node.childrenMap.set(l2, { name: l2, children: [], seen: new Set() });
                const l2Node = l1Node.childrenMap.get(l2);
                if (!l2Node.seen.has(l3)) {
                    l2Node.seen.add(l3);
                    l2Node.children.push({ name: l3 });
                    l1Node.l3_count += 1;
                }
            });
            const items = Array.from(l1Map.values()).sort((a, b) => a.name.localeCompare(b.name, 'zh')).map((l1Node) => ({
                name: l1Node.name,
                l3_count: l1Node.l3_count,
                children: Array.from(l1Node.childrenMap.values()).sort((a, b) => a.name.localeCompare(b.name, 'zh')).map((l2Node) => ({
                    name: l2Node.name,
                    l3_count: l2Node.children.length,
                    children: l2Node.children.sort((a, b) => a.name.localeCompare(b.name, 'zh')),
                })),
            }));
            return {
                items,
                l1_count: items.length,
                l3_count: items.reduce((sum, item) => sum + item.l3_count, 0),
            };
        }

        function occupiedKeys() {
            const taken = new Set();
            ruleGroups.forEach((group, idx) => {
                if (idx === editingIndex) return;
                (((group || {}).categories || {}).paths || []).forEach((path) => taken.add(pathKey(path)));
            });
            return taken;
        }

        function rebuildPathMap() {
            categoryPathMap = new Map();
            (categoryTree.items || []).forEach((l1) => {
                (l1.children || []).forEach((l2) => {
                    (l2.children || []).forEach((l3) => {
                        const path = { l1: l1.name, l2: l2.name, l3: l3.name };
                        categoryPathMap.set(pathKey(path), path);
                    });
                });
            });
        }

        function currentSelectedPaths() {
            return Array.from(selectedKeys).map((key) => categoryPathMap.get(key)).filter(Boolean);
        }

        function l1Key(name) {
            return String(name || '').trim();
        }

        function l2Key(l1, l2) {
            return `${l1Key(l1)}||${String(l2 || '').trim()}`;
        }

        function syncTreeFromRuleGroupsIfNeeded() {
            if ((categoryTree.items || []).length > 0) return;
            const paths = [];
            ruleGroups.forEach((group) => {
                ((((group || {}).categories || {}).paths) || []).forEach((path) => paths.push(path));
            });
            if (paths.length > 0) {
                categoryTree = buildTreeFromPaths(paths);
                rebuildPathMap();
                document.getElementById('category-source-note').textContent = '当前类目树根据模板里已保存的类目回显。';
            }
        }

        function metricEnabledCount(metrics) {
            return METRICS.reduce((sum, metric) => sum + ((metrics && metrics[metric.key] && metrics[metric.key].en) ? 1 : 0), 0);
        }

        /** 存库仍为 ratio(0.2=20%)；仅界面用百分比 */
        function maxRelRatioToPercentInput(r) {
            if (r == null || r === '' || Number.isNaN(Number(r))) return '';
            const p = Number(r) * 100;
            return String(Math.round(p * 1000) / 1000);
        }
        function percentInputToMaxRelRatio(s) {
            const p = parseFloat(s);
            if (!Number.isFinite(p) || p < 0) return 0;
            return p / 100;
        }

        function setMetricUiState(metricKey, config) {
            const root = document.querySelector(`.metric-card[data-metric="${metricKey}"]`);
            if (!root) return;
            const checkbox = root.querySelector('.metric-en');
            checkbox.checked = !!config.en;
            root.querySelector('.metric-body').style.opacity = config.en ? '1' : '.55';
            if (root.querySelector('.metric-rel')) {
                const mr = config.max_rel;
                root.querySelector('.metric-rel').value = maxRelRatioToPercentInput(mr);
            }
            if (root.querySelector('.metric-diff')) root.querySelector('.metric-diff').value = config.max_diff ?? '';
            if (root.querySelector('.syn-list')) renderSynRows(metricKey, config.syn || []);
        }

        function buildMetricCards() {
            const root = document.getElementById('metrics-root');
            root.innerHTML = '';
            METRICS.forEach((metric, idx) => {
                const card = document.createElement('div');
                card.className = 'metric-card';
                card.dataset.metric = metric.key;
                let body = '';
                if (metric.type === 'bool') {
                    body = `
                        <div class="metric-inline-note">${metric.note}</div>`;
                } else if (metric.type === 'rel') {
                    body = `
                        <div class="metric-row">
                            <div>
                                <label class="label">相对容差（%）</label>
                                <div class="metric-pct-input">
                                    <input class="metric-rel" type="number" min="0" max="1000" step="${metric.step}" value="${metric.defaultValue}">
                                    <span class="metric-pct-suffix">%</span>
                                </div>
                                <div class="metric-inline-note">${metric.note}</div>
                            </div>
                        </div>`;
                } else if (metric.type === 'diff') {
                    body = `
                        <div class="metric-row">
                            <div>
                                <label class="label">最大差值 max_diff</label>
                                <input class="metric-diff" type="number" step="${metric.step}" value="${metric.defaultValue}">
                                <div class="metric-inline-note">${metric.note}</div>
                            </div>
                        </div>`;
                } else {
                    body = `
                        <div class="field" style="margin-bottom:10px;">
                            <label class="label">同义词组</label>
                            <div class="syn-list"></div>
                            <button type="button" class="btn-mini btn-outline add-syn-group" style="padding:8px 12px; margin-top:8px;">+ 新增同义组</button>
                            <div class="metric-inline-note">${metric.note}</div>
                        </div>`;
                }
                card.innerHTML = `
                    <div class="metric-head">
                        <div>
                            <div class="metric-name">${String(idx + 1).padStart(2, '0')} ${metric.title}</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" class="metric-en" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="metric-help">${metric.help}</div>
                    <div class="metric-body">${body}</div>
                `;
                root.appendChild(card);
            });

            document.querySelectorAll('.metric-en').forEach((el) => {
                el.addEventListener('change', () => {
                    const card = el.closest('.metric-card');
                    card.querySelector('.metric-body').style.opacity = el.checked ? '1' : '.55';
                });
            });
            document.querySelectorAll('.add-syn-group').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const metricKey = btn.closest('.metric-card').dataset.metric;
                    const groups = readSynGroups(metricKey);
                    groups.push([]);
                    renderSynRows(metricKey, groups);
                });
            });
        }

        function readSynGroups(metricKey) {
            const root = document.querySelector(`.metric-card[data-metric="${metricKey}"] .syn-list`);
            if (!root) return [];
            const rows = [];
            root.querySelectorAll('.syn-row input').forEach((input) => {
                const vals = input.value.split(/[,，]/).map((v) => v.trim()).filter(Boolean);
                if (vals.length) rows.push(uniqueList(vals));
            });
            return rows;
        }

        function renderSynRows(metricKey, groups) {
            const root = document.querySelector(`.metric-card[data-metric="${metricKey}"] .syn-list`);
            if (!root) return;
            root.innerHTML = '';
            if (!groups.length) {
                const empty = document.createElement('div');
                empty.className = 'syn-empty';
                empty.textContent = '暂无同义词组。';
                root.appendChild(empty);
                return;
            }
            groups.forEach((group, idx) => {
                const row = document.createElement('div');
                row.className = 'syn-row';
                row.innerHTML = `
                    <input type="text" value="${(group || []).join(', ')}" placeholder="例如：听, 罐">
                    <button type="button" class="btn-mini btn-danger" style="padding:8px 10px;">删除</button>
                `;
                row.querySelector('button').addEventListener('click', () => {
                    const next = readSynGroups(metricKey).filter((_, i) => i !== idx);
                    renderSynRows(metricKey, next);
                });
                root.appendChild(row);
            });
        }

        function readMetricsFromUi() {
            const metrics = {};
            METRICS.forEach((metric) => {
                const root = document.querySelector(`.metric-card[data-metric="${metric.key}"]`);
                const en = !!root.querySelector('.metric-en').checked;
                if (metric.type === 'bool') {
                    metrics[metric.key] = { en };
                } else if (metric.type === 'rel') {
                    metrics[metric.key] = { en, max_rel: percentInputToMaxRelRatio(root.querySelector('.metric-rel').value) };
                } else if (metric.type === 'diff') {
                    metrics[metric.key] = { en, max_diff: parseFloat(root.querySelector('.metric-diff').value || '0') || 0 };
                } else {
                    metrics[metric.key] = { en, syn: readSynGroups(metric.key) };
                }
            });
            return metrics;
        }

        function setMetricsToUi(metrics) {
            const merged = Object.assign(defaultMetrics(), metrics || {});
            METRICS.forEach((metric) => {
                const cfg = Object.assign({}, defaultMetrics()[metric.key], merged[metric.key] || {});
                setMetricUiState(metric.key, cfg);
            });
        }

        function getVisibleSelectableKeys() {
            const occupied = occupiedKeys();
            const keys = [];
            (categoryTree.items || []).forEach((l1) => {
                (l1.children || []).forEach((l2) => {
                    (l2.children || []).forEach((l3) => {
                        const path = { l1: l1.name, l2: l2.name, l3: l3.name };
                        const key = pathKey(path);
                        if (occupied.has(key) && !selectedKeys.has(key)) return;
                        keys.push(key);
                    });
                });
            });
            return keys;
        }

        /** 标签配置中的「美团一级类目」在树下对应的所有可勾选 key（受已占用列过滤） */
        function keysForTagL1Names(l1Names) {
            const occ = occupiedKeys();
            const want = new Set(
                (l1Names || []).map((s) => String(s || '').trim()).filter(Boolean),
            );
            const out = [];
            (categoryTree.items || []).forEach((l1) => {
                if (!want.has(l1.name)) return;
                (l1.children || []).forEach((l2) => {
                    (l2.children || []).forEach((l3) => {
                        const key = pathKey({ l1: l1.name, l2: l2.name, l3: l3.name });
                        if (occ.has(key) && !selectedKeys.has(key)) return;
                        out.push(key);
                    });
                });
            });
            return out;
        }

        function updateBucketTagActiveState() {
            const root = document.getElementById('bucket-tags');
            if (!root) return;
            const buttons = root.querySelectorAll('.bucket-tag');
            bucketTagList.forEach((tag, i) => {
                const btn = buttons[i];
                if (!btn) return;
                const keys = keysForTagL1Names(tag.l1);
                const allOn = keys.length > 0 && keys.every((k) => selectedKeys.has(k));
                btn.classList.toggle('active', allOn);
            });
        }

        function applyBucketTag(tag) {
            if (!tag || !Array.isArray(tag.l1)) return;
            const keys = keysForTagL1Names(tag.l1);
            if (!keys.length) return;
            const allOn = keys.every((k) => selectedKeys.has(k));
            if (allOn) keys.forEach((k) => selectedKeys.delete(k));
            else keys.forEach((k) => selectedKeys.add(k));
            (tag.l1 || []).forEach((name) => {
                const l1 = (categoryTree.items || []).find((x) => x.name === name);
                if (l1) {
                    expandedL1.add(l1Key(l1.name));
                    (l1.children || []).forEach((l2) => {
                        expandedL2.add(l2Key(l1.name, l2.name));
                    });
                }
            });
            renderCategoryTree();
            renderDraftSummary();
        }

        async function loadBucketTags() {
            try {
                const r = await fetch('/api/rule-categories/bucket-tags');
                const j = await r.json();
                bucketTagList = j.status === 'ok' && Array.isArray(j.tags) ? j.tags : [];
            } catch (e) {
                bucketTagList = [];
            }
            const root = document.getElementById('bucket-tags');
            if (!root) return;
            root.innerHTML = '';
            bucketTagList.forEach((tag) => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'bucket-tag';
                b.textContent = tag.label || tag.id || '标签';
                const l1s = (tag.l1 || []).filter(Boolean);
                b.title = l1s.length ? `包含一级类目：${l1s.join('、')}` : '';
                b.addEventListener('click', () => applyBucketTag(tag));
                root.appendChild(b);
            });
            updateBucketTagActiveState();
        }

        function isTreeFullyExpanded() {
            const items = categoryTree.items || [];
            if (!items.length) return false;
            for (const l1 of items) {
                if (!expandedL1.has(l1Key(l1.name))) return false;
                for (const l2 of l1.children || []) {
                    if (!expandedL2.has(l2Key(l1.name, l2.name))) return false;
                }
            }
            return true;
        }

        function refreshTreeToolbarLabels() {
            const ex = document.getElementById('expand-toggle-btn');
            const sel = document.getElementById('select-toggle-btn');
            if (ex) ex.textContent = isTreeFullyExpanded() ? '全部收起' : '全部展开';
            if (sel) {
                const vis = getVisibleSelectableKeys();
                const allOn = vis.length > 0 && vis.every((k) => selectedKeys.has(k));
                sel.textContent = allOn ? '取消全选' : '全选';
            }
        }

        function renderCategoryTree() {
            const root = document.getElementById('category-tree');
            root.innerHTML = '';
            const occupied = occupiedKeys();
            if (!(categoryTree.items || []).length) {
                root.innerHTML = '<div class="empty">上传类目文件后，这里会出现一二三级类目树；也可以先从右侧编辑已保存规则组。</div>';
                refreshTreeToolbarLabels();
                updateBucketTagActiveState();
                return;
            }

            (categoryTree.items || []).forEach((l1) => {
                const visibleL2 = (l1.children || [])
                    .map((l2) => ({
                        ...l2,
                        visibleL3: l2.children || [],
                    }))
                    .filter((l2) => l2.visibleL3.length);
                if (!visibleL2.length) return;

                const block = document.createElement('div');
                block.className = 'tree-block';
                const l1NodeKey = l1Key(l1.name);
                const l1Expanded = expandedL1.has(l1NodeKey);

                const l1Ids = visibleL2.flatMap((l2) => l2.visibleL3.map((l3) => pathKey({ l1: l1.name, l2: l2.name, l3: l3.name })));
                block.appendChild(renderNodeCheckbox('l1', l1.name, l1Ids, occupied, `${l1.l3_count} 个三级类目`, {
                    expanded: l1Expanded,
                    onToggle: () => {
                        if (expandedL1.has(l1NodeKey)) expandedL1.delete(l1NodeKey);
                        else expandedL1.add(l1NodeKey);
                        renderCategoryTree();
                    },
                }));
                if (!l1Expanded) {
                    root.appendChild(block);
                    return;
                }

                visibleL2.forEach((l2) => {
                    const l2NodeKey = l2Key(l1.name, l2.name);
                    const l2Expanded = expandedL2.has(l2NodeKey);
                    const l2Ids = l2.visibleL3.map((l3) => pathKey({ l1: l1.name, l2: l2.name, l3: l3.name }));
                    block.appendChild(renderNodeCheckbox('l2', l2.name, l2Ids, occupied, `${l2.l3_count} 个`, {
                        expanded: l2Expanded,
                        onToggle: () => {
                            if (expandedL2.has(l2NodeKey)) expandedL2.delete(l2NodeKey);
                            else expandedL2.add(l2NodeKey);
                            renderCategoryTree();
                        },
                    }));
                    if (!l2Expanded) return;
                    l2.visibleL3.forEach((l3) => {
                        const key = pathKey({ l1: l1.name, l2: l2.name, l3: l3.name });
                        const disabled = occupied.has(key) && !selectedKeys.has(key);
                        const node = document.createElement('label');
                        node.className = `node l3 ${disabled ? 'disabled' : ''}`;
                        node.innerHTML = `
                            <span class="toggle-spacer"></span>
                            <input type="checkbox" ${selectedKeys.has(key) ? 'checked' : ''} ${disabled ? 'disabled' : ''}>
                            <span>${l3.name}</span>
                            ${disabled ? '<span class="node-note">已配置</span>' : ''}
                        `;
                        node.querySelector('input').addEventListener('change', (e) => {
                            if (e.target.checked) selectedKeys.add(key);
                            else selectedKeys.delete(key);
                            renderCategoryTree();
                            renderDraftSummary();
                        });
                        block.appendChild(node);
                    });
                });
                root.appendChild(block);
            });

            if (!root.children.length) root.innerHTML = '<div class="empty">暂无类目数据。</div>';
            refreshTreeToolbarLabels();
            updateBucketTagActiveState();
        }

        function renderNodeCheckbox(levelClass, label, keys, occupied, noteText, toggleOptions = null) {
            const availableKeys = keys.filter((key) => !(occupied.has(key) && !selectedKeys.has(key)));
            const checkedCount = availableKeys.filter((key) => selectedKeys.has(key)).length;
            const allChecked = availableKeys.length > 0 && checkedCount === availableKeys.length;
            const partial = checkedCount > 0 && checkedCount < availableKeys.length;
            const disabled = availableKeys.length === 0;
            const node = document.createElement('label');
            node.className = `node ${levelClass} ${disabled ? 'disabled' : ''}`;
            node.innerHTML = `
                ${toggleOptions ? `<button type="button" class="toggle-btn" aria-label="${toggleOptions.expanded ? '收起' : '展开'}">${toggleOptions.expanded ? '▾' : '▸'}</button>` : '<span class="toggle-spacer"></span>'}
                <input type="checkbox" ${allChecked ? 'checked' : ''} ${disabled ? 'disabled' : ''}>
                <span>${label}</span>
                <span class="node-note">${noteText || ''}</span>
            `;
            if (toggleOptions) {
                node.querySelector('.toggle-btn').addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    toggleOptions.onToggle();
                });
            }
            const input = node.querySelector('input');
            input.indeterminate = partial;
            input.addEventListener('change', (e) => {
                if (e.target.checked) availableKeys.forEach((key) => selectedKeys.add(key));
                else availableKeys.forEach((key) => selectedKeys.delete(key));
                renderCategoryTree();
                renderDraftSummary();
            });
            return node;
        }

        function renderDraftSummary() {
            const paths = currentSelectedPaths();
            const l1 = uniqueList(paths.map((p) => p.l1));
            const l2 = uniqueList(paths.map((p) => p.l2));
            const title = document.getElementById('draft-summary-title');
            const text = document.getElementById('draft-summary-text');
            if (!paths.length) {
                title.textContent = '尚未选择三级类目';
                text.textContent = '左侧选择类目后，在这里配置规则。';
                return;
            }
            title.textContent = `当前已选 ${paths.length} 个三级类目`;
            text.textContent = `覆盖 ${l1.length} 个一级类目、${l2.length} 个二级类目。一级类目：${l1.slice(0, 5).join('、')}${l1.length > 5 ? '…' : ''}`;
        }

        function resetDraft() {
            selectedKeys = new Set();
            editingIndex = null;
            setMetricsToUi(defaultMetrics());
            renderCategoryTree();
            renderDraftSummary();
            renderRuleGroups();
        }

        function buildAutoGroupName(paths) {
            const l1 = uniqueList(paths.map((p) => p.l1)).filter(Boolean);
            if (l1.length === 1) return `${l1[0]}规则`;
            if (l1.length > 1) return `${l1.slice(0, 2).join(' / ')}规则`;
            const l3 = uniqueList(paths.map((p) => p.l3)).filter(Boolean);
            if (l3.length === 1) return `${l3[0]}规则`;
            return `规则组 ${ruleGroups.length + 1}`;
        }

        function normalizeGroupDraft(name, paths, metrics) {
            const cleanPaths = paths.map((path) => ({
                l1: String(path.l1 || '').trim(),
                l2: String(path.l2 || '').trim(),
                l3: String(path.l3 || '').trim(),
            })).filter((path) => path.l3);
            return {
                id: editingIndex != null && ruleGroups[editingIndex] ? ruleGroups[editingIndex].id : `group_${Date.now()}`,
                name: String(name || '').trim() || buildAutoGroupName(cleanPaths),
                categories: {
                    paths: cleanPaths,
                    l1: uniqueList(cleanPaths.map((p) => p.l1)),
                    l2: uniqueList(cleanPaths.map((p) => p.l2)),
                    l3: uniqueList(cleanPaths.map((p) => p.l3)),
                },
                metrics,
            };
        }

        function renderRuleGroups() {
            const root = document.getElementById('rule-groups-list');
            root.innerHTML = '';
            if (!ruleGroups.length) {
                root.innerHTML = '<div class="empty">还没有保存规则组。</div>';
                return;
            }
            ruleGroups.forEach((group, idx) => {
                const card = document.createElement('div');
                card.className = 'side-card';
                const l1 = (((group || {}).categories || {}).l1 || []).join('、');
                const l3Count = (((group || {}).categories || {}).l3 || []).length;
                card.innerHTML = `
                    <h3>${escapeHtml(group.name || ('规则组 ' + (idx + 1)))}</h3>
                    <div class="side-meta">${l3Count} 个三级类目${l1 ? ' · ' + escapeHtml(l1) : ''}</div>
                    <table class="side-table">
                        <thead><tr><th>CATEGORY</th><th>METRICS</th></tr></thead>
                        <tbody>
                            <tr><td>三级类目</td><td>${l3Count}</td></tr>
                            <tr><td>一级类目</td><td>${(((group || {}).categories || {}).l1 || []).length}</td></tr>
                            <tr><td>已启用维度</td><td>${metricEnabledCount(group.metrics)}/${METRICS.length}</td></tr>
                        </tbody>
                    </table>
                    <div class="side-actions">
                        <button type="button" class="btn-mini btn-outline edit-btn">编辑</button>
                        <button type="button" class="btn-mini btn-danger del-btn">删除</button>
                    </div>
                `;
                card.querySelector('.edit-btn').addEventListener('click', () => editRuleGroup(idx));
                card.querySelector('.del-btn').addEventListener('click', () => deleteRuleGroup(idx));
                root.appendChild(card);
            });
        }

        function editRuleGroup(idx) {
            const group = ruleGroups[idx];
            if (!group) return;
            editingIndex = idx;
            selectedKeys = new Set(((((group || {}).categories || {}).paths) || []).map((path) => pathKey(path)));
            setMetricsToUi(group.metrics || {});
            syncTreeFromRuleGroupsIfNeeded();
            renderCategoryTree();
            renderDraftSummary();
            renderRuleGroups();
        }

        function deleteRuleGroup(idx) {
            if (!confirm('确定删除这条规则组？')) return;
            ruleGroups.splice(idx, 1);
            if (editingIndex === idx) {
                resetDraft();
            } else {
                if (editingIndex != null && editingIndex > idx) editingIndex -= 1;
                syncTreeFromRuleGroupsIfNeeded();
                renderCategoryTree();
                renderDraftSummary();
                renderRuleGroups();
            }
        }

        async function uploadCategoryFile(file) {
            const fd = new FormData();
            fd.append('file', file);
            const r = await fetch('/api/rule-categories/parse', { method: 'POST', body: fd });
            const j = await r.json();
            if (j.status !== 'ok' || !j.tree) throw new Error(j.message || '解析失败');
            categoryTree = j.tree;
            rebuildPathMap();
            document.getElementById('category-source-note').textContent = `已加载 ${file.name}，共 ${j.tree.l1_count} 个一级类目 / ${j.tree.l3_count} 个三级类目。`;
            selectedKeys = new Set(Array.from(selectedKeys).filter((key) => categoryPathMap.has(key)));
            renderCategoryTree();
            renderDraftSummary();
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s == null ? '' : String(s);
            return d.innerHTML;
        }

        async function loadExistingTemplate() {
            if (!TEMPLATE_ID) return;
            const r = await fetch('/api/rule-templates/' + TEMPLATE_ID);
            const j = await r.json();
            if (j.status !== 'ok' || !j.item) {
                alert('加载模板失败');
                return;
            }
            const item = j.item;
            document.getElementById('template-name').value = item.name || '';
            document.getElementById('template-desc').value = item.description || '';
            const config = item.config || { v: 3, rule_groups: [] };
            ruleGroups = Array.isArray(config.rule_groups) ? config.rule_groups : [];
            syncTreeFromRuleGroupsIfNeeded();
            renderCategoryTree();
            renderDraftSummary();
            renderRuleGroups();
        }

        /** 无上传、无已存规则组回显类目树时，加载仓库内默认 xlsx 解析结果 */
        async function tryLoadDefaultCategoryTree() {
            if ((categoryTree.items || []).length > 0) return;
            try {
                const r = await fetch('/api/rule-categories/default');
                if (r.status === 404) return;
                const j = await r.json();
                if (j.status !== 'ok' || !j.tree) return;
                categoryTree = j.tree;
                rebuildPathMap();
                document.getElementById('category-source-note').textContent =
                    `已加载默认类目（${j.tree.l1_count} 个一级 / ${j.tree.l3_count} 个三级），可用「上传类目文件」替换。`;
                expandedL1 = new Set((categoryTree.items || []).map((item) => l1Key(item.name)));
                expandedL2 = new Set(
                    (categoryTree.items || []).flatMap((l1) =>
                        (l1.children || []).map((l2) => l2Key(l1.name, l2.name)),
                    ),
                );
                renderCategoryTree();
                renderDraftSummary();
            } catch (e) {
                /* 无默认文件或非本机部署时忽略 */
            }
        }

        function collectTemplatePayload() {
            return {
                v: 3,
                rule_groups: ruleGroups,
            };
        }

        buildMetricCards();
        setMetricsToUi(defaultMetrics());
        renderCategoryTree();
        renderDraftSummary();
        renderRuleGroups();
        (async () => {
            await loadExistingTemplate();
            await tryLoadDefaultCategoryTree();
            await loadBucketTags();
        })();
        document.getElementById('expand-toggle-btn').addEventListener('click', () => {
            if (isTreeFullyExpanded()) {
                expandedL1 = new Set();
                expandedL2 = new Set();
            } else {
                expandedL1 = new Set((categoryTree.items || []).map((item) => l1Key(item.name)));
                expandedL2 = new Set(
                    (categoryTree.items || []).flatMap((l1) => (l1.children || []).map((l2) => l2Key(l1.name, l2.name))),
                );
            }
            renderCategoryTree();
        });
        document.getElementById('select-toggle-btn').addEventListener('click', () => {
            const vis = getVisibleSelectableKeys();
            if (!vis.length) return;
            const allOn = vis.every((k) => selectedKeys.has(k));
            if (allOn) vis.forEach((k) => selectedKeys.delete(k));
            else vis.forEach((k) => selectedKeys.add(k));
            renderCategoryTree();
            renderDraftSummary();
        });
        document.getElementById('category-file-input').addEventListener('change', async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            try {
                await uploadCategoryFile(file);
            } catch (err) {
                alert(err.message || '上传失败');
            } finally {
                e.target.value = '';
            }
        });

        document.getElementById('save-group-btn').addEventListener('click', () => {
            const paths = currentSelectedPaths();
            if (!paths.length) {
                alert('请先在左侧至少选择一个三级类目。');
                return;
            }
            const metrics = readMetricsFromUi();
            const name = '';
            const group = normalizeGroupDraft(name, paths, metrics);
            if (editingIndex == null) ruleGroups.push(group);
            else ruleGroups.splice(editingIndex, 1, group);
            resetDraft();
        });

        document.getElementById('clear-draft-btn').addEventListener('click', () => {
            resetDraft();
        });

        document.getElementById('submit-template-btn').addEventListener('click', async () => {
            const nameEl = document.getElementById('template-name');
            const name = (nameEl.value || '').trim();
            if (!name) {
                alert('请填写模板名称。');
                nameEl.focus();
                return;
            }
            const description = (document.getElementById('template-desc').value || '').trim();
            if (!ruleGroups.length) {
                alert('请至少保存一条规则组后再提交。');
                return;
            }
            const payload = { name, description, config: collectTemplatePayload() };
            try {
                let resp;
                if (!TEMPLATE_ID) {
                    resp = await fetch('/api/rule-templates', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                } else {
                    resp = await fetch('/api/rule-templates/' + TEMPLATE_ID, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                }
                const j = await resp.json();
                if (j.status === 'ok') {
                    location.href = '/match-rules';
                    return;
                }
                alert(j.message || '提交失败');
            } catch (err) {
                alert('提交失败，请稍后再试。');
            }
        });
    </script>
</body>
</html>
