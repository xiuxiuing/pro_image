<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>软件激活 - 离线授权系统</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .hwid-box { background: #eee; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 14px; margin-bottom: 20px; word-break: break-all; border: 1px solid #ddd; }
        .btn { background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn:hover { background: #357abd; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <h1>软件未激活</h1>
        <p>此软件受离线授权系统保护。请将以下<b>机器指纹 (HWID)</b> 发送给供应商以获取授权文件，并将其放置在程序根目录下命名为 <code>license.dat</code>。</p>
        <div class="hwid-box" id="hwid">{{ hwid }}</div>
        <button class="btn" onclick="copyHWID()">复制机器指纹</button>
        <p class="footer">机器 ID: {{ hwid }}</p>
    </div>
    <script>
        function copyHWID() {
            const hwid = document.getElementById('hwid').innerText;
            navigator.clipboard.writeText(hwid).then(() => {
                alert('机器指纹已复制到剪贴板');
            });
        }
    </script>
</body>
</html>
