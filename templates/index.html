                if (t.closest('label') && t.closest('.card-actions')) return;
                const el = t.closest('.copyable-field-value');
                if (!el || !grid.contains(el)) return;
                const b64 = el.getAttribute('data-copy-b64');
                if (b64 === null || b64 === '') return;
                ev.preventDefault();
                ev.stopPropagation();
                copyFieldValueToClipboard(decodeCopyPayload(b64));
            });
            grid.addEventListener('keydown', (ev) => {
                if (ev.key !== 'Enter' && ev.key !== ' ') return;
                const t = _eventTargetElement(ev);
                if (!t) return;
                const el = t.closest('.copyable-field-value');
                if (!el || !grid.contains(el)) return;
                const b64 = el.getAttribute('data-copy-b64');
                if (b64 === null || b64 === '') return;
                ev.preventDefault();
                ev.stopPropagation();
                copyFieldValueToClipboard(decodeCopyPayload(b64));
            });
        }

        function getRowBySku(skuId) {
            if (!skuId) return null;
            return gridData.find(r => String(r.skuId) === String(skuId)) || null;
        }

        function isEliminatedRow(row) {
            return String(row?.['淘汰标记'] ?? '') === '1' || String(row?.['是否淘汰'] ?? '') === '是';
        }

        function renderPagination(totalItems, totalPages) {
            const paginEl = document.getElementById('pagination');
            if (!paginEl || totalItems === 0) {
                if (paginEl) paginEl.innerHTML = '';
                return;
            }

            let pagesHtml = '';
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            if (endPage - startPage + 1 < maxVisiblePages) startPage = Math.max(1, endPage - maxVisiblePages + 1);

            for (let i = startPage; i <= endPage; i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            paginEl.innerHTML = `
                <div class="pagination-info">
                    <span style="font-weight: bold;">spu : ${spuCount}</span>
                    <span style="margin-left: 16px; font-weight: bold;">sku : ${totalItems}</span> 
                </div>
                <div class="pagination-controls">
                    <select class="page-size-selector" onchange="changePageSize(parseInt(this.value))">
                        ${[10, 20, 50, 100].map(s => `<option value="${s}" ${pageSize === s ? 'selected' : ''}>${s} 条/页</option>`).join('')}
                    </select>
                    <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一页</button>
                    ${pagesHtml}
                    <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一页</button>
                    <div class="page-jump-wrap">
                        <span class="page-jump-label">跳至</span>
                        <input type="number" class="page-jump-input" min="1" max="${totalPages}" value="${currentPage}"
                            onkeydown="if(event.key==='Enter') jumpToPage(this.value, ${totalPages})">
                        <span class="page-jump-label">页</span>
                    </div>
                </div>
            `;
        }

        function changePage(page) {
            currentPage = page;
            filterData(false);
        }

        function changePageSize(size) {
            pageSize = parseInt(size);
            currentPage = 1;
            filterData(true);
        }

        function jumpToPage(page, totalPages) {
            let p = parseInt(page);
            if (isNaN(p) || p < 1) p = 1;
            if (p > totalPages) p = totalPages;
            changePage(p);
        }

        function getStoreColor(storeId) {
            if (storeId === null) return 'var(--card-main-bg)';
            // Brighter, more vibrant color palette (Vibrant Pastels)
            const colors = [
                'hsla(45, 100%, 88%, 1)',  // Amber/Yellow
                'hsla(145, 80%, 88%, 1)',  // Emerald Green
                'hsla(210, 90%, 90%, 1)',  // Sky Blue
                'hsla(265, 85%, 92%, 1)',  // Electric Violet
                'hsla(335, 90%, 92%, 1)',  // Rose Pink
                'hsla(25, 100%, 89%, 1)'   // Sunset Orange
            ];
            const idx = parseInt(storeId) % colors.length;
            return colors[idx] || 'rgba(0,0,0,0.05)';
        }

        /* 
         * --- 商品卡片构造器 ---
         * 根据字段配置动态构建主店或竞店的产品信息卡片
         */
        function createProductCard(row, storeId) {
            const card = document.createElement('div');
            const prefix = (storeId === null ? "" : storeId);

            const compSkuId = escAttr(row[`${prefix}skuId`] || '');
            const storeNameForComp = !isMain ? ((storeSources.find(x => x.id === storeId) || {}).name || '') : '';
            const compPriceMatched = !isMain && !!(row['跟价店'] && String(row['跟价店']).trim() === storeNameForComp);
            const compAddMarked = !isMain && row[`${prefix}是否新增`] === '是';

            card.className = `product-card ${isMain ? 'main-card' : 'comp-card'}`;

            if (!isMain && !isLinked) {

                    card.innerHTML = `<button type="button" class="ref-icon-btn ref-btn-calibrate ref-btn-calibrate-text" onclick="openModal('${storeId}', '${mainSkuId}')" title="手动选择" aria-label="手动选择">手动选择</button>`;
                } else {
                    card.innerHTML = `<div style="color: #94a3b8; font-size: 11px;">无内容</div>`;
                }

            }

            if (isMain && isEliminatedRow(row)) card.classList.add('eliminated');
            if (isMain && row['is_handled'] === '1') card.style.opacity = '0.6';

            let linkedBadgeHtml = '';
            if (isMain && isUnlinkedMode) {
                const linkedCount = parseInt(row['__linked_count'] || 0);
                linkedBadgeHtml = linkedCount > 0
                    ? `<div class="linked-badge"><img src="https://img.icons8.com/material-outlined/12/ffffff/ok--v1.png"/> 已关联(${linkedCount})</div>`
                    : `<div class="linked-badge" style="background:#64748b;"><img src="https://img.icons8.com/material-outlined/12/ffffff/minus.png"/> 无关联</div>`;
            }

            if (!isMain && isUnlinkedMode && row[`${prefix}__from_pool`]) {
                card.classList.add('unlinked-pool-card');
            }

            let mainTopLeftContent = '';
            let imageContent = '';
            let restOfContent = '';

            const processedFields = new Set();

            // Pre-calculate margins
            const mainPurchPrice = parseFloat(row['采购价']) || 0;
            const mainNewActPrice = parseFloat(row['新活动价']) || 0;

            visibleColumns.forEach(col => {
                const val = row[`${prefix}${col}`] || "-";

                if (col === '主图链接') {
                    let imgSrc = getImageSrc(val);
                    imageContent = `<div class="card-top-image" ${isMain ? `onclick="editMainImage('${mainSkuId}', '${imgSrc}')" title="点击修改图片链接"` : ''}>
                    <img src="${imgSrc}" onerror="this.src='${PLACEHOLDER_IMG}'">
                </div>`;
                    return;
                }

                const isPriceField = ['原价', '活动价'].includes(col);
                const isSuggestionField = ['新售价', '新活动价'].includes(col);
                const isSalesField = (col === '销售');
                const isMarginField = ['现价毛利', '跟价毛利'].includes(col);
                if (!isMain && isMarginField) return;

                if (isMarginField) {
                    let displayVal = "-";
                    let isNegative = false;
                    const mainSellPrice = parseFloat(row['活动价']) || parseFloat(row['原价']) || 0;
                    if (col === '现价毛利') {
                        const actPrice = parseFloat(row[prefix + '活动价']) || parseFloat(row[prefix + '原价']) || 0;
                        if (actPrice > 0 && mainPurchPrice > 0) {
                            const diff = (actPrice - mainPurchPrice).toFixed(2);
                            const pct = ((actPrice - mainPurchPrice) / actPrice * 100).toFixed(2);
                            isNegative = parseFloat(diff) < 0 || (mainSellPrice > 12.9 && parseFloat(diff) < 5.5);
                            displayVal = `${diff}（${pct}%）`;
                        }
                    } else if (col === '跟价毛利') {

                            const pct = ((newAct - mainPurchPrice) / newAct * 100).toFixed(2);

                    const color = isNegative ? "#ef4444" : "#1e293b";

                }

                if (isSuggestionField) {
                    if (!isMain || processedFields.has('建议价')) return;
                    processedFields.add('建议价');

                    const sOrig = row[`${prefix}新售价`] || "-";
                    const sAct = row[`${prefix}新活动价`] || "-";

                    restOfContent += `
                <div class="info-group" style="background: #fff1f2; margin: 0 -12px; padding: 6px 12px; justify-content: space-between; gap: 8px; flex-wrap: nowrap; border-bottom: none;">

                    const html = `

                    <div class="info-stats" style="flex: 1; text-align: left; font-weight: 700; ${color ? 'color:' + color + ';' : ''}">
                        <span style="${extraStyle ? extraStyle + ' color: #fff !important;' : ''}">

                if (['零售价'].includes(col)) {

                        <div class="info-label" style="width: 70px; flex-shrink:0;">${col}</div>

                    <div class="info-group" style="justify-content: flex-start; gap: 8px;">

        ${!isMain && row[`${prefix}是否新增`] === '是' ? `<div class="status-badge badge-new"><div class="stamp-inner"><div class="stamp-text">商品新增</div></div></div>` : ''}
        
        <div class="card-top-section" style="display:flex; justify-content:space-between; padding:10px; gap:10px; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(255,255,255,0.2);">

                ${mainTopLeftContent}
            </div>
            ${imageContent}
        </div>

        ${isMain ? (() => {

            const refNameStore = row['ref_name_store'] || '';

            const nameStoreName = refNameStore ? (storeSources.find(s => s.id === refNameStore) || {}).name || refNameStore : '';

                ${refNameStore ? `<span class="ref-tag ref-tag-name">名称参考: ${nameStoreName}<span class="ref-tag-close" onclick="toggleRef('${mainSkuId}', '', 'name')">×</span></span>` : ''}
            </div>`;
        })() : ''}

        <div class="card-info" style="padding:10px 12px;">${restOfContent}</div>
        
        <div class="card-actions">
            ${isMain ? `
                <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:11px; color:#64748b;">
                    <input type="checkbox" ${row['is_handled']==='1' ? 'checked' : ''}
                        onchange="toggleHandled('${mainSkuId}', this.checked)">
                    已处理
                </label>
                <button class="action-btn btn-eliminate" onclick="eliminate('${mainSkuId}')">
                    ${isEliminatedRow(row) ? '恢复商品' : '标记淘汰'}

            ` : `
                ${!isUnlinkedMode ? `
                    <button type="button" class="ref-icon-btn ref-btn-image ${row['ref_image_store'] === storeId ? 'ref-active-image' : ''}" onclick="toggleRef('${mainSkuId}', '${storeId}', 'image')" title="用此图片">📷</button>
                    <button type="button" class="ref-icon-btn ref-btn-name ${row['ref_name_store'] === storeId ? 'ref-active-name' : ''}" onclick="toggleRef('${mainSkuId}', '${storeId}', 'name')" title="用此名称">✏️</button>
                    <button type="button" class="ref-icon-btn ref-btn-unlink" onclick="unlinkProduct('${storeId}', '${mainSkuId}')" title="取消关联" aria-label="取消关联"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/><line x1="4" y1="4" x2="20" y2="20"/></svg></button>
                    <button type="button" class="ref-icon-btn ref-btn-calibrate" onclick="openModal('${storeId}', '${mainSkuId}')" title="手动选择" aria-label="手动选择"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
                    <button type="button" class="ref-icon-btn ref-btn-pricematch ${compPriceMatched ? 'ref-active-pricematch' : ''}" onclick="priceMatch('${storeId}', '${mainSkuId}')" title="${compPriceMatched ? '取消跟价' : '智能跟价'}" aria-label="${compPriceMatched ? '取消跟价' : '智能跟价'}"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></button>

        // 修改主店图片链接
        async function editMainImage(mainSkuId, currentUrl) {
            const newUrl = prompt("请输入新的图片链接：", currentUrl !== '-' ? currentUrl : '');
            if (newUrl !== null && newUrl.trim() !== "") {
                const url = newUrl.trim();
                await updateField(mainSkuId, '主图链接', url);
                await updateField(mainSkuId, '图片', url);
                const row = getRowBySku(mainSkuId);
                if (row) {
                    const variants = ['商品图片', '主图', '首图'];
                    for (let v of variants) {
                        if (row[v] !== undefined) {
                            await updateField(mainSkuId, v, url);
                        }
                    }
                }
                refreshSingleRow(mainSkuId);
            }
        }

        async function eliminate(mainSkuId) {
            if (!mainSkuId) return;
            const row = getRowBySku(mainSkuId);
            if (!row) return;
            const next = (isEliminatedRow(row) ? 0 : 1);
            await fetch('/api/eliminate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ main_sku_id: mainSkuId, status: next })
            });
            row['淘汰标记'] = String(next);
            row['是否淘汰'] = (next === 1 ? "是" : "否");
            const handled = (next === 1);
            await fetch('/api/toggle_handled', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ main_sku_id: mainSkuId, handled })
            });
            row['is_handled'] = handled ? '1' : '0';
            if (showUnhandledOnly && handled) {
                refreshSingleRow(mainSkuId, { remove: true });
            } else {
                refreshSingleRow(mainSkuId);
            }
        }

        async function toggleAdd(storeId, compSkuId) {
            if (!compSkuId) return;
            const prefix = storeId;
            const row = gridData.find(r => String(r[prefix + 'skuId']) === String(compSkuId));
            if (!row) return;
            const currentIsNew = row[prefix + '是否新增'] === '是';
            const newStatus = !currentIsNew;
            
            try {
                const response = await fetch('/api/toggle_add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ store_id: storeId, is_new: newStatus, sku_id: compSkuId })
                });
                if (response.ok) {
                    const newStatusStr = newStatus ? '是' : '否';
                    const affectedSkuIds = [];
                    gridData.forEach(r => {
                        if (String(r[prefix + 'skuId']) === String(compSkuId)) {
                            r[prefix + '是否新增'] = newStatusStr;
                            r[prefix + 'is_new_add'] = newStatusStr;
                            if (r.skuId) affectedSkuIds.push(String(r.skuId));
                        }
                    });
                    affectedSkuIds.forEach(id => refreshSingleRow(id));
                }
            } catch (e) {
                console.error("Toggle add failed:", e);
                alert("操作失败");
            }
        }

        async function priceMatch(storeId, mainSkuId) {
            if (!mainSkuId) return;
            const row = getRowBySku(mainSkuId);
            if (!row) return;
            const currentStore = String(row['跟价店'] || '').trim();
            const clickedStoreName = (storeSources.find(s => s.id === storeId) || {}).name || '';
            if (currentStore && currentStore === clickedStoreName) {
                await fetch('/api/clear_price_match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ main_sku_id: mainSkuId })
                });
                row['新活动价'] = '';
                row['新售价'] = '';
                row['跟价店'] = '';
                refreshSingleRow(mainSkuId);
            } else {
                const res = await fetch('/api/price_match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ main_sku_id: mainSkuId, store_id: storeId })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    row['新活动价'] = result.new_act;
                    row['新售价'] = result.new_orig;
                    row['跟价店'] = result.store_name;
                    refreshSingleRow(mainSkuId);
                }
            }
        }

        async function unlinkProduct(storeId, mainSkuId) {
            if (!mainSkuId) return;
            const row = getRowBySku(mainSkuId);
            const storeName = (storeSources.find(s => s.id === storeId) || {}).name || '';
            const matchedPrice = row && storeName && String(row['跟价店'] || '').trim() === storeName;
            const matchedImage = row && row['ref_image_store'] === storeId;
            const matchedName = row && row['ref_name_store'] === storeId;
            const warnings = [];
            if (matchedPrice) warnings.push('跟价');
            if (matchedImage) warnings.push('图片参考');
            if (matchedName) warnings.push('名称参考');
            const msg = warnings.length > 0
                ? `该商品已标记「${storeName}」为${warnings.join('、')}来源，取消关联将同时清除这些标记，确定继续？`
                : '确定要取消关联吗？此操作将清空该列在该行的所有数据。';
            if (!confirm(msg)) return;

            try {
                if (matchedPrice) {
                    await fetch('/api/clear_price_match', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ main_sku_id: mainSkuId })
                    });
                    if (row) { row['新活动价'] = ''; row['新售价'] = ''; row['跟价店'] = ''; }
                }
                if (matchedImage) {
                    await fetch('/api/toggle_ref', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ main_sku_id: mainSkuId, store_id: '', field: 'image' }) });
                    if (row) row['ref_image_store'] = '';
                }
                if (matchedName) {
                    await fetch('/api/toggle_ref', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ main_sku_id: mainSkuId, store_id: '', field: 'name' }) });
                    if (row) row['ref_name_store'] = '';
                }
                const response = await fetch('/api/unlink', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ main_sku_id: mainSkuId, store_id: storeId })
                });
                if (response.ok) {
                    filterData(false);
                }
            } catch (e) {
                console.error("Unlink failed:", e);
                alert("取消关联失败");
            }
        }

            const warnings = [];
            if (matchedPrice) warnings.push('跟价');
            if (matchedImage) warnings.push('图片参考');
            if (matchedName) warnings.push('名称参考');
            if (warnings.length > 0) {
                if (!confirm(`该商品已标记「${storeName}」为${warnings.join('、')}来源，更换关联将同时清除这些标记，确定继续？`)) return;

                    if (row) { row['新活动价'] = ''; row['新售价'] = ''; row['跟价店'] = ''; }

                body: JSON.stringify({ main_sku_id: String(mainSkuId).trim(), store_id: storeId, comp_sku_id: String(compSkuId).trim() })

        /* 
         * --- 数据导出功能 ---
         * 调用后端接口生成 Excel 并触发浏览器下载
         */
        async function exportExcel() {
            const btn = document.getElementById('exportBtn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-small"></span> 正在生成...';

            try {
                const response = await fetch('/api/export?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                // Try to get filename from header
                let filename = "对比分析成果_" + new Date().toISOString().slice(0, 10) + ".zip";
                const disposition = response.headers.get('Content-Disposition');
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) {
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                console.error(err);
                alert("下载失败，请稍后重试。");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        // Image Zoom Logic
        function initImagePreview() {
            const overlay = document.getElementById('image-zoom-overlay');
            const zoomImg = document.getElementById('zoom-img');
            
            const zoomImgSelector = '.card-top-image img, .product-list-img img, .modal-thumb-zoom img';

            document.addEventListener('mouseover', e => {
                const img = e.target.closest(zoomImgSelector);
                if (img) {
                    zoomImg.src = img.src;
                    overlay.style.display = 'block';
                    updateZoomPos(e);
                }
            });

            document.addEventListener('mousemove', e => {
                if (overlay.style.display === 'block') updateZoomPos(e);
            });

            document.addEventListener('mouseout', e => {
                if (e.target.closest(zoomImgSelector)) {
                    overlay.style.display = 'none';
                }
            });
        }

        function updateZoomPos(event) {
            const overlay = document.getElementById('image-zoom-overlay');
            let x = event.clientX + 20, y = event.clientY - 175;
            const winW = window.innerWidth, winH = window.innerHeight;
            if (x + 350 > winW) x = event.clientX - 370;
            if (y < 10) y = 10;
            if (y + 350 > winH) y = winH - 360;
            overlay.style.left = x + 'px'; overlay.style.top = y + 'px';
        }

                    else { toggle.textContent = expanded ? '‹' : '›'; }
                    toggle.setAttribute('title', expanded ? '收合侧栏' : '展开侧栏');
                    toggle.setAttribute('aria-label', expanded ? '收合侧栏' : '展开侧栏');
                }
            }
            if (toggle && nav) {
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    nav.classList.toggle('collapsed');
                    syncAppNavChrome();
                });
            }
            syncAppNavChrome();
            function showPanel(name) {
                const map = { data: 'panel-data', projects: 'panel-projects', strategy: 'panel-strategy' };
                const wantId = map[name];
                if (!wantId) return;
                document.querySelectorAll('.app-nav-panel').forEach((p) => {
                    p.classList.toggle('is-active', p.id === wantId);
                });
                document.querySelectorAll('.app-nav-link').forEach((btn) => {
                    btn.classList.toggle('is-active', btn.getAttribute('data-panel') === name);
                });
                requestAnimationFrame(alignSidebarToggleToMainStoreTab);
            }
            document.querySelectorAll('.app-nav-link').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const name = btn.getAttribute('data-panel');
                    if (name) showPanel(name);
                });
            });
            const relayout = debounce(() => alignSidebarToggleToMainStoreTab(), 100);
            window.addEventListener('resize', relayout);
            const scroller = document.getElementById('scroller');
            if (scroller) {
                scroller.addEventListener('scroll', () => {
                    requestAnimationFrame(alignSidebarToggleToMainStoreTab);
                }, { passive: true });
            }
            requestAnimationFrame(alignSidebarToggleToMainStoreTab);
        }

        window.addEventListener('DOMContentLoaded', () => {
            initAppNav();
            setupCopyFieldDelegation();
            loadData();
            initImagePreview();

            const globalSearch = document.getElementById('globalSearch');
            if (globalSearch) {
                globalSearch.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        filterData();
                    }
                });
            }
            const modalSearch = document.getElementById('modalSearch');
            if (modalSearch) {
                const debouncedModalSearch = debounce(() => renderModalList(), 300);
                modalSearch.addEventListener('input', debouncedModalSearch);
                modalSearch.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        renderModalList();
                    }
                });
            }
        });
    </script>
    <div id="image-zoom-overlay"><img src="" id="zoom-img"></div>
</body>

</html>
