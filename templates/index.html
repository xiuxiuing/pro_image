<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>商品竞对分析平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 
         * --- 设计系统与变量定义 ---
         * 包含全局颜色、间距、圆角以及阴影定义
         */
        :root {
            --bg-color: #f8fafc;
            --sidebar-width: 120px;
            --app-nav-width: 152px;
            --min-card-width: 220px;
            --card-gap: 16px;
            --primary-color: #6366f1;
            /* Indigo */
            --primary-hover: #4f46e5;
            --danger-color: #f43f5e;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
            --card-main-bg: #e0e7ff;
            --card-comp-bg: #fffbeb;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), url('/static/bg_meituan.jpg') center/cover no-repeat fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Styles */
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            z-index: 100;
        }

        .header-title {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #0f172a 0%, #4338ca 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.01em;
            line-height: 1.1;
        }

        .header-slogan {
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 38px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            border-color: #cbd5e1;
            transform: translateY(-1.5px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary, .btn-unlinked {
            color: #fff;
            border: none;
        }

        .btn-primary { background: var(--primary-color); }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-unlinked { background: #6366f1; }
        .btn-unlinked:hover { background: #4f46e5; }
        .btn-unlinked.active {
            background: #60a5fa;
        }
        .btn-unlinked.active:hover {
            background: #3b82f6;
        }

        .btn-primary img {
             filter: brightness(0) invert(1);
        }
        .btn-unlinked svg {
            vertical-align: middle;
            margin-right: 2px;
        }

        /* ---------------------------------------------------------
         * --- 布局组件样式 (容器, 滚动条, 表头等) ---
         * --------------------------------------------------------- */

        /* 主体布局容器 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Scrollable Area */
        .product-scroller {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 0 16px 12px 16px; /* No top padding to keep sticky header flush */
        }

        /* Header Row with Store Tabs */
        .store-header-row {
            display: grid;
            grid-template-columns: repeat(var(--col-count, 4), 1fr);
            gap: var(--card-gap);
            min-width: calc(var(--min-card-width) * var(--col-count, 4));
            position: sticky;
            top: -1px; /* Slight overlap to avoid hairline gaps */
            z-index: 50;
            padding: 16px 16px 16px 16px;
            background: rgba(248, 250, 252, 0.98);
            margin: 0 -16px 8px; /* Offset the 16px scroller padding */
            border-bottom: 2px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05); /* Added slight shadow depth */
        }

        .store-tab {
            width: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            min-width: 0;
            border-radius: var(--radius-md);
            padding: 8px 12px;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .tab-main {
            border-color: #dbeafe;
        }

        .tab-comp {
            border-color: #fef3c7;
        }

        /* Row Layout */
        .products-row {
            display: grid;
            grid-template-columns: repeat(var(--col-count, 4), 1fr);
            gap: var(--card-gap);
            min-width: calc(var(--min-card-width) * var(--col-count, 4));
            padding: 0 16px;
            margin: 0 -16px 16px;
            animation: slideUp 0.3s ease-out backwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Product Card */
        .product-card {
            width: 100%;
            flex-shrink: 0;
            background: #fff;
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            border: 1px solid #f1f5f9;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            position: relative;
            transition: all 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: #cbd5e1;
        }

        .main-card {
            background: var(--card-main-bg);
            border-color: #dbeafe;
        }

        .comp-card {
            border-color: #fef3c7;
        }

        .empty-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1.5px dashed #e2e8f0;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            min-height: 300px;
        }

        .card-image {
            height: 120px;
            background: rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            padding: 8px;
            position: relative;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-top-image {
            width: 85px;
            height: 85px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .card-top-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #image-zoom-overlay {
            position: fixed;
            display: none;
            width: 350px;
            height: 350px;
            z-index: 10000;
            background: #fff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 8px;
            pointer-events: none;
            overflow: hidden;
        }

        #image-zoom-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-info {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-group {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding-bottom: 4px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.05);
        }

        .info-group:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            flex-shrink: 0;
            width: 60px;
        }

        .info-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
            flex: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info-spec {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            text-align: right;
            flex: 1;
        }

        .info-prices {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            flex: 1;
        }

        .price-act {
            font-size: 15px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .info-stats {
            font-size: 11px;
            color: var(--text-main);
            font-weight: 600;
            text-align: right;
            flex: 1;
        }

        .copyable-field-value {
            position: relative;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
            display: inline-block;
            max-width: 100%;
            vertical-align: top;
            word-break: break-word;
        }

        .copyable-field-value:hover {
            background: rgba(99, 102, 241, 0.12);
        }

        .copyable-field-value::after {
            content: '点击复制';
            position: absolute;
            left: 0;
            top: 100%;
            margin-top: 4px;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
            background: #334155;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .copyable-field-value:hover::after {
            opacity: 1;
            transform: translateY(0);
        }

        .highlight-sales {
            color: #fff !important;
            background: #ef4444 !important;
            padding: 2px 8px !important;
            border-radius: 4px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
            display: inline-block;
        }

        .card-actions {
            padding: 8px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            background: rgba(0, 0, 0, 0.03);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* 竞店底栏：图标在整行宽度内均分对齐（主店底栏不变） */
        .comp-card .card-actions {
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .action-btn {
            background: #fff;
            color: var(--primary-color);
            border: 1.5px solid var(--primary-color);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }

        .ref-icon-btn {
            width: 28px;
            height: 28px;
            min-width: 28px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
            line-height: 1;
        }
        .ref-icon-btn.ref-btn-image {
            background: #fff;
            border: 1.5px solid #ea580c;
        }
        .ref-icon-btn.ref-btn-image:hover {
            background: #fff7ed;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(234, 88, 12, 0.2);
        }
        .ref-icon-btn.ref-active-image {
            background: #ea580c !important;
            border-color: #ea580c !important;
            box-shadow: 0 2px 8px rgba(234, 88, 12, 0.3);
        }
        .ref-icon-btn.ref-btn-name {
            background: #fff;
            border: 1.5px solid #7c3aed;
        }
        .ref-icon-btn.ref-btn-name:hover {
            background: #f5f3ff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2);
        }
        .ref-icon-btn.ref-active-name {
            background: #7c3aed !important;
            border-color: #7c3aed !important;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }
        .ref-icon-btn.ref-btn-unlink {
            background: #fff;
            border: 1.5px solid #ef4444;
            color: #ef4444;
        }
        .ref-icon-btn.ref-btn-unlink:hover {
            background: #fef2f2;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.2);
        }
        .ref-icon-btn.ref-btn-calibrate {
            background: #fff;
            border: 1.5px solid var(--primary-color);
            color: var(--primary-color);
        }
        .ref-icon-btn.ref-btn-calibrate:hover {
            background: #eef2ff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
        }
        .ref-icon-btn.ref-btn-calibrate.ref-btn-calibrate-text {
            width: auto;
            min-width: auto;
            padding: 0 8px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }
        .ref-icon-btn.ref-btn-pricematch {
            background: #fff;
            border: 1.5px solid #059669;
            color: #059669;
        }
        .ref-icon-btn.ref-btn-pricematch:hover {
            background: #ecfdf5;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.2);
        }
        .ref-icon-btn.ref-active-pricematch {
            background: #059669 !important;
            border-color: #059669 !important;
            color: #fff !important;
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.35);
        }
        .ref-icon-btn.ref-btn-add {
            background: #fff;
            border: 1.5px solid #64748b;
            color: #64748b;
        }
        .ref-icon-btn.ref-btn-add:hover {
            background: #f8fafc;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(100, 116, 139, 0.2);
        }
        .ref-icon-btn.ref-active-add {
            background: #16a34a !important;
            border-color: #16a34a !important;
            color: #fff !important;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
        }
        .ref-icon-btn.ref-btn-link-pool {
            background: #fff;
            border: 1.5px solid #ef4444;
            color: #ef4444;
        }
        .ref-icon-btn.ref-btn-link-pool:hover {
            background: #fef2f2;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.2);
        }
        .ref-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            cursor: default;
            white-space: nowrap;
        }
        .ref-tag-image {
            background: #fff7ed;
            color: #ea580c;
            border: 1px solid #fed7aa;
        }
        .ref-tag-name {
            background: #f5f3ff;
            color: #7c3aed;
            border: 1px solid #ddd6fe;
        }
        .ref-tag .ref-tag-close {
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            opacity: 0.6;
            margin-left: 2px;
        }
        .ref-tag .ref-tag-close:hover {
            opacity: 1;
        }

        /* 主店已关联角标不拦截点击，避免「已处理」/底栏在部分布局下点不动 */
        .product-card .linked-badge {
            pointer-events: none;
        }
        /* 底栏常用按钮在 flex 子项拉长时保证在可点层，避免与 card-info 叠放异常 */
        .product-card .card-actions {
            position: relative;
            z-index: 2;
        }

        .btn-eliminate {
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        .btn-eliminate:hover {
            background: var(--danger-color);
            color: #fff;
        }

        /* Editable Input Styles */
        .editable-price {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-color);
            background: #fff;
            text-align: right;
        }

        .editable-price:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Status Badge Styles - Professional Stamp */
        .status-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            opacity: 0.85;
            animation: badgeFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) backwards;
        }

        .status-badge .stamp-inner {
            position: absolute;
            inset: 0;
            border: 2px solid currentColor;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-badge .stamp-inner::after {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid currentColor;
            border-radius: 50%;
        }

        .status-badge .stamp-text {
            background: #fff;
            border: 2px solid currentColor;
            padding: 3px 8px;
            font-size: 13px;
            font-weight: 900;
            color: currentColor;
            position: relative;
            z-index: 2;
            white-space: nowrap;
            box-shadow: 0 0 0 3px #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes badgeFadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(-45deg) scale(1.8);
            }

            to {
                opacity: 0.85;
                transform: translate(-50%, -50%) rotate(-15deg) scale(1);
            }
        }

        .badge-eliminated {
            color: #ef4444;
        }

        .badge-new {
            color: #10b981;
        }

        .eliminated {
            opacity: 0.6;
            filter: grayscale(0.8);
        }

        .main-card.eliminated {
            border: 3px solid #ef4444 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12), var(--shadow-md) !important;
        }

        .inline-status-flag {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 120;
            background: #ef4444;
            color: #fff;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.25);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .modal-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 24px;
        }

        .modal-body > .search-box {
            flex-shrink: 0;
            margin-bottom: 16px;
        }

        .modal-list-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Filter Popup */
        .filter-popup {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 200;
            width: 420px;
            padding: 16px;
            animation: slideDown 0.2s ease-out;
            max-height: 80vh;
            flex-direction: column;
        }

        .filter-list-header {
            display: flex;
            justify-content: space-between;
            padding: 0 4px 10px 4px;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-item {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            transition: background 0.2s;
            border-top: 1px solid transparent;
            /* Placeholder for drag visual */
            margin-bottom: 2px;
            background: #fff;
        }

        .sort-mini-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            font-size: 10px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sort-mini-btn:hover {
            background: #e2e8f0;
            color: var(--primary-color);
        }

        .sort-mini-btn.active {
            background: var(--primary-color);
            color: #fff;
        }

        .filter-item:hover {
            background: #f1f5f9;
        }

        .filter-item.dragging {
            opacity: 0.4;
            background: #e2e8f0;
        }

        .filter-input-small {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 11px;
            outline: none;
        }

        .filter-input-small:focus {
            border-color: var(--primary-color);
        }

        .product-list-item {
            display: flex;
            gap: 20px;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .product-list-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary-color);
        }

        .product-list-img {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            background: #fff;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .product-list-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 关联弹窗内缩略图：尺寸保持 40×40，与主列表一样支持悬浮放大 */
        .modal-thumb-zoom {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            margin-right: 12px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            cursor: pointer;
        }

        .modal-thumb-zoom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-list-details {
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
        }

        .modal-product-price {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 16px;
        }

        .modal-product-label {
            color: #9ca3af;
            font-size: 10px;
            text-transform: uppercase;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        /* Image Preview Overlay */
        #imagePreview {
            position: fixed;
            width: 500px;
            height: 500px;
            background: #fff;
            border: 2px solid #e2e8f0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 9999;
            pointer-events: none;
            border-radius: 12px;
            overflow: hidden;
        }

        #imagePreview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        /* Pagination Styles */
        .info-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            gap: 4px;
        }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid var(--glass-border);
            z-index: 100;
        }

        .pagination-info {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .pagination-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f8fafc;
        }

        .page-size-selector {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            background: #fff;
        }

        .page-size-selector:focus {
            border-color: var(--primary-color);
        }

        .page-jump-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 12px;
        }

        .page-jump-wrap .page-jump-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
        }

        .page-jump-input {
            width: 52px;
            height: 36px;
            padding: 0 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            outline: none;
            background: #fff;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .page-jump-input:focus {
            border-color: var(--primary-color);
        }

        .spinner-small {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        #searchClearBtn {
            position: absolute;
            right: 10px;
            cursor: pointer;
            color: #94a3b8;
            display: none;
            font-size: 20px;
            line-height: 1;
            user-select: none;
            transition: color 0.2s;
        }

        #searchClearBtn:hover {
            color: var(--danger-color);
        }

        .linked-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #10b981;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .product-card.unlinked-pool-card {
            border: 1px dashed var(--primary-color);
            background: #f8fafc !important;
        }

        .unlinked-pool-card .card-top-image img {
            border-bottom: 1px dashed #e2e8f0;
        }

        /* 左侧功能导航：收合不占位，把手半露；悬停显图标；展开仅文字 */
        .app-shell {
            display: flex;
            flex: 1;
            min-height: 0;
            width: 100%;
        }
        .app-nav-rail {
            position: relative;
            display: block;
            flex: 0 0 0;
            min-width: 0;
            width: 0;
            overflow: visible;
            z-index: 200;
            align-self: stretch;
            transition: flex 0.22s ease, min-width 0.22s ease, width 0.22s ease;
        }
        .app-nav-rail[data-expanded="true"] {
            flex: 0 0 var(--app-nav-width);
            min-width: var(--app-nav-width);
            width: var(--app-nav-width);
        }
        .app-nav-hover-strut {
            display: block;
            position: fixed;
            left: 0;
            top: 0;
            width: 6px;
            height: 100vh;
            z-index: 199;
            pointer-events: auto;
        }
        .app-nav-rail[data-expanded="true"] .app-nav-hover-strut {
            display: none;
        }
        .app-nav {
            position: relative;
            width: var(--app-nav-width);
            min-width: var(--app-nav-width);
            min-height: 100%;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 10px 8px 16px;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
            transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease, border 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        .app-nav-rail[data-expanded="false"] .app-nav,
        .app-nav.collapsed {
            width: 0;
            min-width: 0;
            padding: 0;
            border: none;
            background: transparent;
            box-shadow: none;
            overflow: visible;
        }
        .app-nav-rail[data-expanded="false"] .app-nav-head {
            min-height: 0;
            height: 0;
            margin: 0;
            padding: 0;
            overflow: visible;
        }
        .app-nav-rail[data-expanded="true"] .app-nav-head,
        .app-nav:not(.collapsed) .app-nav-head {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 10px;
            min-height: 32px;
        }
        .app-nav-rail[data-expanded="false"] .app-nav-head {
            border: 0;
        }
        .app-nav-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            line-height: 1;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .app-nav-toggle:hover { border-color: #cbd5e1; }
        .app-nav-rail[data-expanded="false"] .app-nav-toggle {
            position: fixed;
            left: 0;
            top: var(--app-nav-fab-top, 100px);
            z-index: 204;
            width: 18px;
            min-width: 0;
            height: 44px;
            border-radius: 0 8px 8px 0;
            border-left: 0;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 1px 0 10px rgba(0, 0, 0, 0.12);
            transform: translateX(-7px);
            color: #475569;
        }
        .app-nav-rail[data-expanded="false"] .app-nav-toggle:hover {
            color: var(--text-main);
            width: 20px;
            transform: translateX(-2px);
        }
        .app-nav-rail[data-expanded="false"] .app-nav-toggle span {
            display: block;
            margin-left: 1px;
        }
        .app-nav-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
            width: 100%;
        }
        .app-nav-rail[data-expanded="true"] .app-nav-links {
            align-items: center;
        }
        .app-nav-rail[data-expanded="false"] .app-nav-links {
            position: fixed;
            top: calc(var(--app-nav-fab-top, 100px) + 50px);
            left: 0;
            width: 46px;
            margin-top: 0;
            margin-left: 0;
            padding: 8px 4px 10px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid var(--glass-border);
            border-left: 0;
            border-radius: 0 12px 12px 0;
            box-shadow: 2px 4px 20px rgba(0, 0, 0, 0.12);
            z-index: 203;
            opacity: 0;
            visibility: hidden;
            transform: translateX(calc(-100% - 4px));
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }
        .app-nav-rail[data-expanded="false"]:hover .app-nav-links {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
            pointer-events: auto;
        }
        .app-nav-link {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            background: transparent;
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            transition: background 0.15s, border-color 0.15s, color 0.15s, stroke 0.15s;
        }
        .app-nav-rail[data-expanded="true"] .app-nav-link {
            width: auto;
            max-width: 100%;
            min-width: 0;
            box-sizing: border-box;
            padding: 6px 10px;
            white-space: nowrap;
            text-align: center;
            justify-content: center;
        }
        .app-nav-ic {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: currentColor;
        }
        .app-nav-ic svg {
            width: 20px;
            height: 20px;
            display: block;
        }
        .app-nav:not(.collapsed) .app-nav-ic { display: none; }
        .app-nav:not(.collapsed) .app-nav-link { gap: 0; }
        .app-nav:not(.collapsed) .app-nav-txt { display: inline; }
        .app-nav-rail[data-expanded="true"] .app-nav .app-nav-txt { display: inline; }
        .app-nav-rail[data-expanded="false"] .app-nav-txt { display: none; }
        .app-nav-rail[data-expanded="false"] .app-nav-link {
            width: 100%;
            justify-content: center;
            padding: 8px 2px;
        }
        .app-nav-link:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
        }
        .app-nav-link.is-active {
            background: #eef2ff;
            color: var(--primary-color);
            border-color: #c7d2fe;
        }
        .app-main-wrap {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .app-nav-panel {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }
        .app-nav-panel.is-active { display: flex; }
        .app-nav-panel--placeholder {
            align-items: center;
            justify-content: center;
            background: rgba(248, 250, 252, 0.4);
        }
        /* 侧栏子页：勿写 display，避免覆盖 .app-nav-panel 的 display:none；激活态由 .is-active 提供 flex */
        .app-nav-panel--sub {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            background: rgba(248, 250, 252, 0.4);
        }
        .dashboard-subpanel {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px 20px;
            box-sizing: border-box;
        }
        .app-placeholder { text-align: center; padding: 24px; }
        .app-placeholder-title {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 0.2em;
        }
        .app-placeholder-sub {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="app-shell">
    <div class="app-nav-rail" id="appNavRail" data-expanded="false">
    <div class="app-nav-hover-strut" aria-hidden="true"></div>
    <aside class="app-nav collapsed" id="appNav" aria-label="功能导航">
        <div class="app-nav-head">
            <button type="button" class="app-nav-toggle" id="appNavToggle" title="展开侧栏" aria-label="展开侧栏"><span class="app-nav-chevron">›</span></button>
        </div>
        <nav class="app-nav-links" role="navigation">
            <button type="button" class="app-nav-link" data-panel="data" title="数据分析">
                <span class="app-nav-ic" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                </span>
                <span class="app-nav-txt">数据分析</span>
            </button>
            <button type="button" class="app-nav-link is-active" data-panel="projects" title="项目中心">
                <span class="app-nav-ic" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>
                </span>
                <span class="app-nav-txt">项目中心</span>
            </button>
            <button type="button" class="app-nav-link" data-panel="strategy" title="策略中心">
                <span class="app-nav-ic" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="2"></circle><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg>
                </span>
                <span class="app-nav-txt">策略中心</span>
            </button>
        </nav>
    </aside>
    </div>
    <div class="app-main-wrap">
    <div id="panel-projects" class="app-nav-panel is-active">
    <!-- 
      - 页头区域：包含标题、搜索框以及功能按钮
      -->
    <header>
        <div style="display: flex; flex-direction: column; cursor: pointer;" onclick="location.href='/'" title="回到项目中心">
            <div class="header-title">商品竞对分析平台</div>
             <div class="header-slogan" style="text-transform: none;">洞察竞对态势 • 驱动价格决策 <span style="margin-left: 15px; color: var(--text-muted); font-weight: 400; text-transform: none;">(当前项目: <span style="color: var(--primary-color); font-weight: 700;">{{ active_project }}</span>)</span></div>
        </div>
        <div class="header-actions">
            <div class="search-wrapper">
                <input type="text" class="btn" id="globalSearch" placeholder="搜索标题/SKUID..."
                    oninput="handleSearch(); document.getElementById('searchClearBtn').style.display = this.value ? 'block' : 'none';"
                    onkeydown="if(event.key==='Enter')handleSearch()"
                    style="width: 220px; border-radius: 8px; padding-right: 30px;">
                <span id="searchClearBtn" onclick="clearSearch()" title="重置搜索">&times;</span>
            </div>
            <div style="position: relative;">
                <button class="btn" onclick="toggleFilter()"><img
                        src="https://img.icons8.com/material-outlined/20/000000/filter.png" /> 展示筛选</button>
                <div class="filter-popup" id="filterPopup">
                    <!-- Filter checkboxes will be injected here -->
                </div>
            </div>
            <button class="btn btn-unlinked" id="unlinkedToggleBtn" onclick="toggleUnlinkedMode()" title="显示所有未关联的竞店数据池">
                <svg id="unlinkedIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                <span id="unlinkedBtnText">未关联数据</span>
            </button>
            <button class="btn btn-primary" id="exportBtn" onclick="exportExcel()">
                <img src="https://img.icons8.com/material-outlined/20/ffffff/download.png" /> 全部导出
            </button>
            <button class="btn btn-primary" id="exportNewBtn" style="background: #10b981; border-color: #10b981;" onclick="exportNewItems()">
                <img src="https://img.icons8.com/material-outlined/20/ffffff/add-file.png" /> 修改导出
            </button>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar" id="sidebar" style="display:none"></div>

        <div class="product-scroller" id="scroller">
            <div class="store-header-row" id="storeHeader">
                <!-- Store headers will be generated here -->
            </div>
            <div id="gridBody">
                <div style="padding: 40px; text-align: center; color: #6b7280; font-size: 18px;" id="loadingMsg">
                    正在加载数据，请稍候...
                </div>
            </div>
        </div>
    </div>

    <div class="pagination-container" id="pagination">
        <!-- Pagination will be injected here -->
    </div>
    </div>
    <div id="panel-data" class="app-nav-panel app-nav-panel--sub">
        {% include 'partials/panel_data_analysis.html' %}
    </div>
    <div id="panel-strategy" class="app-nav-panel app-nav-panel--sub">
        {% include 'partials/panel_strategy.html' %}
    </div>
    </div>
    </div>

    <div id="imagePreview"></div>

    <div class="modal" id="linkModal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display:flex;align-items:baseline;gap:8px;">
                    <h3>选择对应商品</h3>
                    <span id="modalCount" style="font-size:13px;font-weight:400;color:#94a3b8;"></span>
                </div>
                <button class="btn" onclick="closeModal()">关闭</button>
            </div>
            <div class="modal-body">
                <input type="text" class="search-box" id="modalSearch" placeholder="搜索商品名/条码...">
                <div id="modalList" class="modal-list-scroll"></div>
            </div>
        </div>
    </div>



    <script>
        /* 
         * ---------------------------------------------------------
         * --- 全局变量与核心状态管理 ---
         * ---------------------------------------------------------
         */
        let gridData = [];              // 原始全量数据
        let filteredData = [];          // 过滤/排序后的展示数据
        let storeSources = [];          // 竞店配置信息
        let mainStoreName = "主店";       // 主店名称 (Target)
        let currentLinkAction = null;    // 当前正在进行的关联操作上下文
        let allStoreProducts = {};       // 缓存各竞店的商品列表 (用于人工校准弹窗)
        let allBaseColumns = [];         // 数据中的所有可用字段名（已剔除不展示字段，如 A*）
        let visibleColumns = [];         // 当前用户选择展示的字段名
        let advancedFilters = {};        // 高级筛选条件 (字段: 关键字)
        let currentSort = { field: null, order: null }; // 当前排序状态
        let showNegativeSalesOnly = false; // 是否只显示负销量 (竞店销量 > 主店销量)
        let showNoLinkOnly = false;        // 是否只显示无关联商品
        let showUnhandledOnly = false;     // 是否只显示未处理商品
        let currentPage = 1;             // 当前页码
        let pageSize = 50;               // 每页显示条数
        let totalItems = 0;
        let totalPages = 0;
        let spuCount = 0;
        let currentFilterMode = 'all'; 
        let isUnlinkedMode = false;      // 是否处于“未关联数据池”模式
        let linkModalMode = "store_comp"; // store_comp | main_pool
        let mainProductsCache = [];

        const PLACEHOLDER_IMG = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

        function debounce(fn, ms) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), ms);
            };
        }

        function getImageSrc(val) {
            if (!val || val === '-' || val === "" || val === "nan") return PLACEHOLDER_IMG;
            if (val.startsWith('http')) return val;
            return '/img/' + val;
        }

        /* 
         * --- 数据初始化与加载 ---
         */
        async function loadData(resetPage = true) {
            if (resetPage) currentPage = 1;
            const loadingMsg = document.getElementById('loadingMsg');
            if (loadingMsg) {
                loadingMsg.style.display = 'block';
                loadingMsg.innerText = "数据载入中，请稍候...";
            }

            try {
                if (!storeSources || storeSources.length === 0) {
                    const configRes = await fetch('/api/config');
                    const config = await configRes.json();
                    storeSources = config.stores;
                    mainStoreName = config.main_store;
                }

                const searchInput = document.getElementById('globalSearch');
                const searchVal = searchInput ? searchInput.value.trim() : "";
                
                const filtersPayload = {};
                Object.keys(advancedFilters).forEach(k => {
                    const v = (advancedFilters[k] || '').trim();
                    if (v) filtersPayload[k] = v;
                });
                const sortField = currentSort.field || '';
                const sortOrder = currentSort.order || 'desc';
                const neg = showNegativeSalesOnly ? '1' : '0';
                let url = `/api/grid_data?page=${currentPage}&limit=${pageSize}&search=${encodeURIComponent(searchVal)}&mode=${currentFilterMode}`;
                url += `&filters=${encodeURIComponent(JSON.stringify(filtersPayload))}`;
                url += `&sort_field=${encodeURIComponent(sortField)}&sort_order=${encodeURIComponent(sortOrder)}`;
                url += `&negative_sales=${neg}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                gridData = data.items;
                filteredData = data.items;
                totalItems = data.total;
                totalPages = data.pages;
                spuCount = data.spu_count || 0;

                if (totalItems === 0 && !searchVal) {
                    if (loadingMsg) loadingMsg.innerText = "当前项目未包含分析结果。";
                    return;
                }

                if (loadingMsg) loadingMsg.style.display = 'none';

                extractHeaders();
                renderGrid(false);
                renderPagination(totalItems, totalPages);
                renderFilterPopup();
            } catch (e) {
                console.error("Failed to load data:", e);
                if (loadingMsg) {
                    loadingMsg.style.color = "red";
                    loadingMsg.innerText = `数据加载失败: ${e.message}`;
                }
            }
        }

        async function loadUnlinkedData(resetPage = true) {
            if (resetPage) currentPage = 1;
            const loadingMsg = document.getElementById('loadingMsg');
            if (loadingMsg) {
                loadingMsg.style.display = 'block';
                loadingMsg.innerText = "正在加载未匹配数据...";
            }
            try {
                if (!storeSources || storeSources.length === 0) {
                    const configRes = await fetch('/api/config');
                    const config = await configRes.json();
                    storeSources = config.stores;
                    mainStoreName = config.main_store;
                }
                const searchVal = (document.getElementById('globalSearch')?.value || "").trim();
                const categoryVal = (advancedFilters['美团类目三级'] || "").trim();
                const sortOrder = currentSort.order || 'desc';
                const mSort = /^(\d+)销售$/.exec(currentSort.field || '');
                const sortStoreIdForApi = mSort ? mSort[1] : '';
                const filtersPayload = {};
                Object.keys(advancedFilters).forEach(k => {
                    const v = (advancedFilters[k] || '').trim();
                    if (v) filtersPayload[k] = v;
                });
                const neg = showNegativeSalesOnly ? '1' : '0';
                let url = `/api/unlinked_items?page=${currentPage}&limit=${pageSize}&search=${encodeURIComponent(searchVal)}&category3=${encodeURIComponent(categoryVal)}&sort_store_id=${encodeURIComponent(sortStoreIdForApi)}&sort_order=${encodeURIComponent(sortOrder)}`;
                url += `&filters=${encodeURIComponent(JSON.stringify(filtersPayload))}&negative_sales=${neg}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                gridData = data.items || [];
                filteredData = gridData;
                totalItems = data.total || 0;
                totalPages = data.pages || 0;
                spuCount = data.spu_count || 0;
                if (loadingMsg) loadingMsg.style.display = 'none';
                extractHeaders();
                renderGrid(false);
                renderPagination(totalItems, totalPages);
                renderFilterPopup();
            } catch (e) {
                console.error("Failed to load unlinked data:", e);
                if (loadingMsg) {
                    loadingMsg.style.color = "red";
                    loadingMsg.innerText = `未匹配数据加载失败: ${e.message}`;
                }
            }
        }

        function saveColumnSettings() {
            console.log("Saving column settings:", allBaseColumns, visibleColumns);
            localStorage.setItem('pro_image_all_columns', JSON.stringify(allBaseColumns));
            localStorage.setItem('pro_image_visible_columns', JSON.stringify(visibleColumns));
        }

        function loadColumnSettings() {
            try {
                const savedAll = JSON.parse(localStorage.getItem('pro_image_all_columns'));
                const savedVisible = JSON.parse(localStorage.getItem('pro_image_visible_columns'));
                console.log("Loaded column settings:", savedAll, savedVisible);
                return { savedAll, savedVisible };
            } catch (e) {
                console.error("Failed to load column settings:", e);
                return { savedAll: null, savedVisible: null };
            }
        }

        /* 
         * --- 字段提取与表头管理 ---
         * 从原始数据中提取所有可能的 Key，并根据优先级或缓存进行排序
         */
        function extractHeaders() {
            if (gridData.length === 0) return;
            const allKeys = new Set();
            const internalKeys = ['淘汰标记', '是否淘汰', '__idx', '相似度', '匹配', '是否新增', '跟价店'];

            gridData.forEach(row => {
                Object.keys(row).forEach(key => {
                    const baseKey = key.replace(/^\d+/, '');
                    // 过滤掉 A* 字段（AI 旧提取列），不在“展示筛选”中出现
                    if (String(baseKey).startsWith('A')) return;
                    if (!internalKeys.includes(baseKey) && !internalKeys.includes(key)) {
                        allKeys.add(baseKey);
                    }
                });
            });

            // Inject Gross Margin fields if 采购价 exists
            if (allKeys.has('采购价')) {
                allKeys.add('现价毛利');
                allKeys.add('跟价毛利');
            }

            const currentKeys = Array.from(allKeys);
            const { savedAll, savedVisible } = loadColumnSettings();

            // Determine the order of allBaseColumns
            if (savedAll && Array.isArray(savedAll)) {
                // Use saved order for existing keys, append new keys
                const ordered = savedAll.filter(k => currentKeys.includes(k));
                const newKeys = currentKeys.filter(k => !savedAll.includes(k));
                allBaseColumns = [...ordered, ...newKeys];
            } else {
                // Default priority sort
                allBaseColumns = currentKeys;
                const priority = ['条码', '商品名称', '规格', '品牌', '采购价', '跟价毛利', '现价毛利', '活动价', '原价', '销售'];
                allBaseColumns.sort((a, b) => {
                    const idxA = priority.indexOf(a);
                    const idxB = priority.indexOf(b);
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return a.localeCompare(b);
                });
            }

            // Determine visibleColumns
            const defaultVisible = [
                "商品条码", "商品名称", "规格名称", "跟价毛利", "现价毛利", "采购价",
                "活动价", "美团类目三级", "skuId", "主图链接", "原价", "销售"
            ];

            if (savedVisible && Array.isArray(savedVisible)) {
                // Use saved visibility for existing keys, ignore obsolete ones
                visibleColumns = savedVisible
                    .filter(k => !String(k || '').startsWith('A'))
                    .filter(k => k === '主图链接' || currentKeys.includes(k));
            } else {
                // First time initialization
                if (visibleColumns.length === 0) {
                    visibleColumns = defaultVisible.filter(k => k === '主图链接' || allBaseColumns.includes(k));
                } else {
                    // Keep existing logic if visibleColumns isn't empty but savedVisible is missing
                }
            }
            console.log("Effective columns after extractHeaders:", allBaseColumns, visibleColumns);
        }


        /* 
         * --- 数据过滤引擎 ---
         * 整合全局搜索、高级筛选和排序逻辑，生成 filteredData
         */
        function filterData(resetPage = true) {
            if (isUnlinkedMode) {
                loadUnlinkedData(resetPage);
            } else {
                loadData(resetPage);
            }
        }

        function setSort(field, order) {
            if (currentSort.field === field && currentSort.order === order) {
                currentSort = { field: null, order: null };
            } else {
                currentSort = { field: field, order: order };
            }
            renderFilterPopup();
            filterData();
        }

        let fieldSearchTerm = "";

        function renderFilterPopup() {
            const popup = document.getElementById('filterPopup');
            const currentDisplay = popup.style.display || window.getComputedStyle(popup).display;
            if (!popup || currentDisplay === 'none') return;

            popup.style.display = 'flex'; // Ensure flex for the layout

            popup.innerHTML = `
        <div style="margin-bottom: 12px;">
            <input type="text" class="search-box" id="fieldSearch" placeholder="搜索字段名称..." 
                   style="margin-bottom: 12px;" value="${fieldSearchTerm}" oninput="handleFieldSearch(this.value)">
            <div style="display: flex; gap: 8px;">
                <button class="btn" style="flex: 1; font-size: 11px; padding: 4px;" onclick="toggleAllColumns(true)">全选</button>
                <button class="btn" style="flex: 1; font-size: 11px; padding: 4px;" onclick="toggleAllColumns(false)">全不选</button>
                <button class="btn" style="flex: 1; font-size: 11px; padding: 4px;" onclick="resetColumnOrder()">恢复默认顺序</button>
            </div>
        </div>
        <div class="filter-list-header">
            <span>显示/排序内容 (可拖拽排序)</span>
            <span>筛选内容</span>
        </div>
        <div id="filterList" style="flex: 1; overflow-y: auto; padding-right: 4px;"></div>`;

            const list = document.getElementById('filterList');

            allBaseColumns.forEach((col, index) => {

                if (fieldSearchTerm && !col.toLowerCase().includes(fieldSearchTerm.toLowerCase())) return;

                const item = document.createElement('div');
                item.className = 'filter-item';
                item.draggable = true;
                item.dataset.col = col;
                item.dataset.index = index;

                const isChecked = visibleColumns.includes(col);
                const currentFilter = advancedFilters[col] || "";

                item.innerHTML = `
            <div style="display: flex; align-items: center; gap: 8px; flex: 1; cursor: move;">
                <span style="color: #94a3b8; cursor: move;">⠿</span>
                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleColumn('${col}')">
                <span style="flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px;">${col}</span>
            </div>
            <div style="display: flex; align-items: center; gap: 4px;">
                <button class="sort-mini-btn ${currentSort.field === col && currentSort.order === 'asc' ? 'active' : ''}" 
                        onclick="event.stopPropagation(); setSort('${col}', 'asc')">↑</button>
                <button class="sort-mini-btn ${currentSort.field === col && currentSort.order === 'desc' ? 'active' : ''}" 
                        onclick="event.stopPropagation(); setSort('${col}', 'desc')">↓</button>
                <input type="text" class="filter-input-small" placeholder="筛选..." value="${currentFilter}" 
                       onclick="event.stopPropagation()" oninput="updateAdvancedFilter('${col}', this.value)">
            </div>
        `;

                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('dragenter', handleDragEnter);
                item.addEventListener('dragleave', handleDragLeave);
                item.addEventListener('drop', handleDrop);
                item.addEventListener('dragend', handleDragEnd);

                list.appendChild(item);
            });
        }

        function handleFieldSearch(val) {
            fieldSearchTerm = val;
            renderFilterPopup();
        }

        function toggleAllColumns(show) {
            if (show) {
                visibleColumns = ['主图链接', ...allBaseColumns.filter(k => !String(k || '').startsWith('A'))];
            } else {
                visibleColumns = ['主图链接'];
            }
            saveColumnSettings();
            renderGrid();
            renderFilterPopup();
        }

        function resetColumnOrder() {
            localStorage.removeItem('pro_image_all_columns');
            localStorage.removeItem('pro_image_visible_columns');
            visibleColumns = [];
            extractHeaders();
            renderGrid();
            renderFilterPopup();
        }

        let draggedIndex = null;
        function handleDragStart(e) {
            const item = e.target.closest('.filter-item');
            draggedIndex = parseInt(item.dataset.index);
            item.classList.add('dragging');
        }
        function handleDragOver(e) { e.preventDefault(); }
        function handleDragEnter(e) {
            const item = e.target.closest('.filter-item');
            if (item && parseInt(item.dataset.index) !== draggedIndex) {
                item.style.borderTop = '2px solid var(--primary-color)';
            }
        }
        function handleDragLeave(e) {
            const item = e.target.closest('.filter-item');
            if (item) item.style.borderTop = '';
        }
        function handleDragEnd(e) {
            document.querySelectorAll('.filter-item').forEach(it => {
                it.classList.remove('dragging');
                it.style.borderTop = '';
            });
        }
        function handleDrop(e) {
            e.preventDefault();
            const item = e.target.closest('.filter-item');
            if (!item) return;
            const targetIndex = parseInt(item.dataset.index);
            if (draggedIndex === null || draggedIndex === targetIndex) return;

            const movingCol = allBaseColumns.splice(draggedIndex, 1)[0];
            allBaseColumns.splice(targetIndex, 0, movingCol);
            visibleColumns.sort((a, b) => allBaseColumns.indexOf(a) - allBaseColumns.indexOf(b));

            saveColumnSettings();
            renderFilterPopup();
            filterData();
        }

        const _debouncedFilter = debounce(() => filterData(), 300);
        function updateAdvancedFilter(field, val) {
            advancedFilters[field] = val;
            _debouncedFilter();
        }

        function toggleColumn(col) {
            if (visibleColumns.includes(col)) {
                visibleColumns = visibleColumns.filter(c => c !== col);
            } else {
                visibleColumns.push(col);
                visibleColumns.sort((a, b) => allBaseColumns.indexOf(a) - allBaseColumns.indexOf(b));
            }
            saveColumnSettings();
            renderGrid();
        }

        // function toggleNegativeSalesFilter() {
        //     showNegativeSalesOnly = !showNegativeSalesOnly;
        //     filterData();
        // }

        function toggleNoLinkFilter() {
            showNoLinkOnly = !showNoLinkOnly;
            showUnhandledOnly = false;
            currentFilterMode = showNoLinkOnly ? 'no_link' : 'all';
            filterData();
        }

        function toggleUnhandledFilter() {
            showUnhandledOnly = !showUnhandledOnly;
            showNoLinkOnly = false;
            currentFilterMode = showUnhandledOnly ? 'unhandled' : 'all';
            filterData();
        }

        async function toggleHandled(mainSkuId, handled) {
            await fetch('/api/toggle_handled', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ main_sku_id: mainSkuId, handled })
            });
            const row = gridData.find(r => r.skuId === mainSkuId);
            if (row) row.is_handled = handled ? '1' : '0';
            if (showUnhandledOnly && handled) {
                refreshSingleRow(mainSkuId, { remove: true });
            } else {
                refreshSingleRow(mainSkuId);
            }
        }

        async function toggleRef(mainSkuId, storeId, field) {
            const row = gridData.find(r => String(r.skuId) === String(mainSkuId));
            if (!row) return;
            const key = field === 'name' ? 'ref_name_store' : 'ref_image_store';
            const current = row[key] || '';
            const newVal = (current === storeId || !storeId) ? '' : storeId;
            await fetch('/api/toggle_ref', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ main_sku_id: mainSkuId, store_id: newVal, field })
            });
            row[key] = newVal;
            refreshSingleRow(mainSkuId);
        }

        function toggleFilter() {
            const popup = document.getElementById('filterPopup');
            if (popup.style.display === 'flex') {
                popup.style.display = 'none';
            } else {
                popup.style.display = 'flex';
                popup.classList.add('filter-popup'); // Add class for window.onclick check
                renderFilterPopup();
            }
        }

        window.onclick = function (event) {
            const t = event.target;
            const elT = t instanceof Element ? t : (t && t.parentNode);
            if (!(elT instanceof Element)) return;
            const popup = document.getElementById('filterPopup');
            if (popup && (popup.style.display === 'flex' || popup.style.display === 'block') && !elT.closest('.header-actions') && !elT.closest('.filter-popup')) {
                popup.style.display = 'none';
            }
        }

        /* 
         * --- 网格渲染引擎 ---
         * 动态生成表头、分页并渲染商品行
         */
        function renderGrid(resetScroll = false) {
            const gridBodyEl = document.getElementById('gridBody');
            const storeHeaderEl = document.getElementById('storeHeader');
            if (!gridBodyEl || !storeHeaderEl) return;
            gridBodyEl.innerHTML = '';

            // Set dynamic column count for grid layout
            const colCount = storeSources.length + 1;
            document.documentElement.style.setProperty('--col-count', colCount);

            storeHeaderEl.innerHTML = '';

            // Main Store Header
            const mainHeader = document.createElement('div');
            mainHeader.className = 'store-tab tab-main';
            mainHeader.innerHTML = `
        <span>${mainStoreName} (主店)</span>
        <div style="display: flex; gap: 6px; align-items: center;">
            <span style="font-size: 10px; opacity: 0.8; font-weight: 500;">无关联:</span>
            <button class="sort-mini-btn ${showNoLinkOnly ? 'active' : ''}" 
                    style="width: auto; padding: 0 6px; font-size: 10px;"
                    onclick="toggleNoLinkFilter()">开/关</button>
            <span style="font-size: 10px; opacity: 0.8; font-weight: 500; margin-left: 6px;">未处理:</span>
            <button class="sort-mini-btn ${showUnhandledOnly ? 'active' : ''}" 
                    style="width: auto; padding: 0 6px; font-size: 10px;"
                    onclick="toggleUnhandledFilter()">开/关</button>
        </div>
    `;
            mainHeader.style.backgroundColor = getStoreColor(null);
            storeHeaderEl.appendChild(mainHeader);

            // Competitor Headers
            storeSources.forEach(s => {
                const h = document.createElement('div');
                h.className = 'store-tab tab-comp';
                const field = s.id + '销售';
                h.innerHTML = `
            <span>${s.name}</span>
            <div style="display: flex; gap: 4px; align-items: center;">
                <span style="font-size: 10px; opacity: 0.8; font-weight: 500;">销量排序:</span>
                <button class="sort-mini-btn ${currentSort.field === field && currentSort.order === 'asc' ? 'active' : ''}" 
                        onclick="setSort('${field}', 'asc')">↑</button>
                <button class="sort-mini-btn ${currentSort.field === field && currentSort.order === 'desc' ? 'active' : ''}" 
                        onclick="setSort('${field}', 'desc')">↓</button>
            </div>
        `;
                h.style.backgroundColor = getStoreColor(s.id);
                storeHeaderEl.appendChild(h);
            });

            gridData.forEach((row, displayIdx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'products-row';
                rowDiv.dataset.skuId = String(row.skuId || '');
                if (resetScroll) {
                    rowDiv.style.animationDelay = `${displayIdx * 0.05}s`;
                }

                rowDiv.appendChild(createProductCard(row, null));
                storeSources.forEach(s => {
                    rowDiv.appendChild(createProductCard(row, s.id));
                });
                gridBodyEl.appendChild(rowDiv);
            });

            renderPagination(totalItems, totalPages);

            // Scroll back to top ONLY if explicitly requested
            if (resetScroll) {
                document.getElementById('scroller').scrollTop = 0;
            }
            requestAnimationFrame(alignSidebarToggleToMainStoreTab);
        }

        function refreshSingleRow(mainSkuId, { remove = false } = {}) {
            const gridBodyEl = document.getElementById('gridBody');
            if (!gridBodyEl) return;
            const rowDiv = gridBodyEl.querySelector(`.products-row[data-sku-id="${mainSkuId}"]`);
            if (!rowDiv) return;

            if (remove) {
                rowDiv.remove();
                const idx = gridData.findIndex(r => String(r.skuId) === String(mainSkuId));
                if (idx !== -1) gridData.splice(idx, 1);
                return;
            }

            const row = gridData.find(r => String(r.skuId) === String(mainSkuId));
            if (!row) return;
            rowDiv.innerHTML = '';
            rowDiv.style.animation = 'none';
            rowDiv.appendChild(createProductCard(row, null));
            storeSources.forEach(s => {
                rowDiv.appendChild(createProductCard(row, s.id));
            });
        }

        function escAttr(s) {
            return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        function escHtml(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function encodeCopyPayload(s) {
            try {
                return btoa(unescape(encodeURIComponent(String(s))));
            } catch (e) {
                return '';
            }
        }

        function decodeCopyPayload(b64) {
            if (!b64) return '';
            try {
                return decodeURIComponent(escape(atob(b64)));
            } catch (e) {
                return '';
            }
        }

        function showCopyToast(message) {
            let el = document.getElementById('copyToast');
            if (!el) {
                el = document.createElement('div');
                el.id = 'copyToast';
                el.setAttribute('role', 'status');
                el.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#1e293b;color:#fff;border-radius:10px;font-size:14px;font-weight:600;z-index:100000;box-shadow:0 8px 32px rgba(0,0,0,0.25);opacity:0;transition:opacity .2s ease;pointer-events:none;max-width:90vw;text-align:center;';
                document.body.appendChild(el);
            }
            el.textContent = message;
            el.style.opacity = '1';
            clearTimeout(showCopyToast._t);
            showCopyToast._t = setTimeout(() => {
                el.style.opacity = '0';
            }, 2200);
        }

        async function copyFieldValueToClipboard(text) {
            const t = text == null ? '' : String(text);
            let ok = false;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(t);
                    ok = true;
                } else {
                    throw new Error('clipboard unavailable');
                }
            } catch (err) {
                try {
                    const ta = document.createElement('textarea');
                    ta.value = t;
                    ta.setAttribute('readonly', '');
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    ta.style.top = '0';
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    ta.setSelectionRange(0, t.length);
                    ok = document.execCommand('copy');
                    document.body.removeChild(ta);
                } catch (e2) {
                    ok = false;
                }
            }
            showCopyToast(ok ? '已复制到剪贴板' : '复制失败，请手动选中复制');
        }

        function _eventTargetElement(ev) {
            const t = ev.target;
            if (t instanceof Element) return t;
            if (t && t.parentNode instanceof Element) return t.parentNode;
            return null;
        }

        function setupCopyFieldDelegation() {
            const grid = document.getElementById('gridBody');
            if (!grid || grid._copyDelegationBound) return;
            grid._copyDelegationBound = true;
            grid.addEventListener('click', (ev) => {
                const t = _eventTargetElement(ev);
                if (!t) return;
                if (t.closest('button, .ref-icon-btn, .action-btn, .ref-tag-close, input, .editable-price')) return;
