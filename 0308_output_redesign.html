<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品竞对分析平台 - Multi-Group Premium</title>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script type="text/javascript" charset="utf8"
        src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700;800&family=Rubik:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-primary: #059669;
            /* Emerald */
            --color-secondary: #34D399;
            --color-cta: #F97316;
            /* Orange */
            --color-cta-light: #FFEDD5;
            --color-background: #F0FDF4;
            /* Mint White */
            --color-surface: #FFFFFF;
            --color-text: #064E3B;
            --color-text-muted: #4B5563;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: var(--color-background);
            background-image:
                radial-gradient(at 0% 0%, rgba(5, 150, 105, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--color-text);
            margin: 0;
            padding: 24px;
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Rubik', sans-serif;
            font-weight: 700;
            margin-top: 0;
        }

        /* Premium Header */
        .hero {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-info h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .premium-badge {
            font-family: 'Rubik', sans-serif;
            font-size: 0.8rem;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .hero-info p {
            margin: 8px 0 0;
            color: var(--color-text-muted);
            font-size: 1.1rem;
        }

        .upload-zone {
            display: flex;
            gap: 16px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Nunito Sans', sans-serif;
        }

        .btn-primary {
            background: var(--color-cta);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(249, 115, 22, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }

        .btn-outline:hover {
            background: rgba(5, 150, 105, 0.05);
            transform: translateY(-1px);
        }

        /* Controls / Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .card-header h3 {
            margin: 0;
            color: var(--color-primary);
        }

        .toggle-icon {
            margin-right: 12px;
            color: var(--color-primary);
            transition: transform 0.3s;
            font-size: 1.2rem;
        }

        .active .toggle-icon {
            transform: rotate(90deg);
        }

        .collapsible-content {
            display: none;
        }

        .active .collapsible-content {
            display: block;
        }

        /* Sorting Dropdown */
        .premium-select {
            appearance: none;
            background: rgba(255, 255, 255, 0.8) url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23059669%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E") no-repeat right 12px top 50%;
            background-size: 12px auto;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 36px 10px 16px;
            font-size: 1rem;
            font-family: 'Nunito Sans', sans-serif;
            color: var(--color-text);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            outline: none;
            min-width: 280px;
        }

        .premium-select:hover {
            border-color: var(--color-primary);
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.15);
        }

        .premium-select:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
        }

        /* Property Toggles */
        .prop-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .prop-toggle {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-muted);
            user-select: none;
        }

        .prop-toggle:hover {
            background: white;
            border-color: var(--color-primary);
        }

        .prop-toggle.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.3);
        }

        .prop-toggle input {
            display: none;
        }

        /* DataTable Overrides */
        .dataTables_wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--border-radius-xl);
            padding: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
        }

        table.dataTable thead th {
            display: none;
            /* Hide header for card layout */
        }

        table.dataTable tbody td {
            padding: 0 !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        table.dataTable tbody tr {
            background: transparent !important;
        }

        /* Premium Comparison Table Layout */
        .comparison-container {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--border-radius-xl);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            padding-bottom: 8px;
            /* Room for scrollbar */
        }

        .comparison-container::-webkit-scrollbar {
            height: 12px;
        }

        .comparison-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
            margin: 0 12px;
        }

        .comparison-container::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, var(--color-secondary), var(--color-primary));
            border-radius: 10px;
            border: 3px solid transparent;
            background-clip: padding-box;
            transition: all 0.3s ease;
        }

        .comparison-container::-webkit-scrollbar-thumb:hover {
            border: 2px solid transparent;
        }

        .comparison-table {
            width: 100%;
            border-collapse: separate;
            /* Required for border-radius on rows */
            border-spacing: 0;
            min-width: 1000px;
        }

        .comparison-table th {
            padding: 20px 16px;
            text-align: left;
            border-bottom: 2px solid rgba(5, 150, 105, 0.2);
            background: transparent;
            white-space: nowrap;
            font-family: 'Rubik', sans-serif;
            font-size: 1.1rem;
        }

        .comparison-table th.sticky-col {
            position: sticky;
            left: 0;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.04);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            min-width: 120px;
        }

        .comparison-table th.main-col-header {
            background: linear-gradient(180deg, rgba(236, 253, 245, 0.9) 0%, rgba(209, 250, 229, 0.5) 100%);
            min-width: 280px;
            text-align: center;
        }

        .comparison-table th.comp-header {
            text-align: center;
        }

        .comparison-table td {
            padding: 18px 16px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.08);
            /* Dashed lines for lighter feel */
            vertical-align: middle;
            min-width: 260px;
            transition: background-color 0.2s ease;
        }

        .comparison-table td.sticky-col {
            position: sticky;
            left: 0;
            z-index: 5;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            font-weight: 800;
            color: var(--color-primary);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.02);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .comparison-table td.main-col-data {
            background: rgba(236, 253, 245, 0.4);
            border-left: 2px solid rgba(5, 150, 105, 0.1);
            border-right: 2px solid rgba(5, 150, 105, 0.1);
        }

        .comparison-table tr:hover td {
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px dashed rgba(5, 150, 105, 0.3);
        }

        .comparison-table tr:hover td.main-col-data {
            background: rgba(5, 150, 105, 0.08);
        }

        .comparison-table tr:hover td.sticky-col {
            background: rgba(255, 255, 255, 1);
            color: var(--color-text);
        }

        /* Ensure top row has rounded corners */
        .comparison-table tr:first-child th.sticky-col {
            border-top-left-radius: var(--border-radius-xl);
        }

        /* Remove bottom border on last row */
        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-badge {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
            letter-spacing: 0.05em;
        }

        .main-badge {
            background: var(--color-primary);
            color: white;
        }

        .comp-badge {
            background: var(--color-cta-light);
            color: var(--color-cta);
        }

        /* Card Content Styles */
        .prop-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            word-break: break-all;
            font-size: 0.95rem;
        }

        .prop-label {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .prop-value {
            font-weight: 500;
        }

        .img-container {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        .img-container:hover {
            background: white;
            box-shadow: var(--shadow-md);
            border-color: rgba(5, 150, 105, 0.3);
        }

        .product-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: zoom-in;
            transition: transform 0.3s;
        }

        .product-img:hover {
            transform: scale(1.1);
        }

        .title-value {
            font-family: 'Rubik', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--color-text);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .price-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--color-primary);
            font-family: 'Rubik', sans-serif;
        }

        .diff-indicator {
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 8px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .diff-up {
            background: #fee2e2;
            color: #dc2626;
        }

        .diff-down {
            background: #d1fae5;
            color: #059669;
        }

        .similarity-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Floating Image Preview */
        #avg-preview {
            display: none;
            position: fixed;
            z-index: 10000;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 12px;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            pointer-events: none;
            border: 1px solid var(--glass-border);
            max-width: 400px;
        }

        #avg-preview img {
            display: block;
            max-width: 100%;
            border-radius: 8px;
        }

        /* Loader */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(240, 253, 244, 0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(5, 150, 105, 0.1);
            border-top: 6px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="avg-preview"><img src="" /></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 24px; font-weight: 700; color: var(--color-primary); font-size: 1.2rem;">正在为您精心处理数据...</p>
    </div>

    <header class="hero">
        <div class="hero-info">
            <h1>商品竞对分析 <span class="premium-badge">PRO MAX</span></h1>
            <p>全自动多维度竞品横向追踪与比对系统</p>
        </div>
        <div class="upload-zone">
            <input type="file" id="uploadInput" accept=".xlsx, .xls" style="display:none;" />
            <button class="btn btn-outline" onclick="document.getElementById('uploadInput').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                上传分析报表
            </button>
        </div>
    </header>

    <div class="controls-toolbar glass-card active"
        style="padding: 16px; display: flex; flex-direction: column; gap: 16px;">
        <div class="card-header" onclick="this.parentElement.classList.toggle('active')"
            style="margin-bottom: 0; padding-bottom: 0; border-bottom: none;">
            <div class="toggle-icon">▶</div>
            <h3 style="font-size: 1.1rem; display: flex; align-items: center; gap: 12px;">
                视图与导出控制台
                <span
                    style="font-size: 0.8rem; font-weight: 500; color: var(--color-text-muted); background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 6px;">点击展开/折叠面板</span>
            </h3>
        </div>

        <div class="collapsible-content">
            <div
                style="border-top: 1px solid rgba(0,0,0,0.05); margin-top: 8px; padding-top: 16px; display: flex; flex-direction: column; gap: 16px;">
                <!-- Row 1: Toggles -->
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div
                        style="font-weight: 700; font-size: 0.9rem; color: var(--color-text-muted); white-space: nowrap; width: 80px;">
                        显示字段:</div>
                    <div id="colControls" class="prop-toggles" style="gap: 6px;"></div>
                </div>

                <!-- Row 2: Sort & Export -->
                <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                    <div
                        style="font-weight: 700; font-size: 0.9rem; color: var(--color-text-muted); white-space: nowrap; width: 80px;">
                        数据操作:</div>

                    <select id="sortControl" class="premium-select"
                        style="min-width: 200px; padding: 8px 32px 8px 12px; font-size: 0.9rem;">
                        <option value="default">默认排序 (数据源原始顺序)</option>
                        <option value="price_asc">主推商品价格 - 从低到高</option>
                        <option value="price_desc">主推商品价格 - 从高到低</option>
                        <option value="sim_desc">最高匹配度(竞品) - 从高到低</option>
                        <option value="sim_asc">最高匹配度(竞品) - 从低到高</option>
                        <option value="comp_desc">匹配竞品数量 - 从多到少</option>
                    </select>

                    <div style="width: 1px; height: 24px; background: rgba(0,0,0,0.1); margin: 0 8px;"></div>

                    <button class="btn btn-outline" onclick="exportToExcel('all')"
                        style="padding: 8px 16px; font-size: 0.9rem; border-radius: 8px;">全量导出</button>
                    <button class="btn btn-primary" onclick="exportToExcel('comps_only')"
                        style="padding: 8px 16px; font-size: 0.9rem; border-radius: 8px;">仅导出竞品匹配</button>
                </div>
            </div>
        </div>
    </div>

    <div class="dataTables_wrapper">
        <table id="dataTable" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>比对视图</th>
                </tr>
            </thead>
        </table>
    </div>

    <script>
        var table;
        var rawData = [];
        var originalData = [];
        var allBaseProps = new Set();

        // Helper to get safe CSS class name from property name
        function safePropName(name) {
            return 'prop-' + name.replace(/[^a-zA-Z0-9]/g, '_');
        }

        // Handle Property Toggles via dynamic CSS injection
        function togglePropertyView(prop, isVisible) {
            var cssClass = safePropName(prop);
            var styleId = 'style-' + cssClass;
            if (!isVisible) {
                if ($('#' + styleId).length === 0) {
                    $('<style id="' + styleId + '">.' + cssClass + ' { display: none !important; }</style>').appendTo('head');
                }
            } else {
                $('#' + styleId).remove();
            }
        }

        function buildColControls() {
            var container = $('#colControls');
            container.empty();

            // Priority order for properties
            var priority = ["主图链接", "菜单名", "活动价", "原价", "规格名", "相似度", "匹配", "销售", "条码", "skuId"];
            var sortedProps = Array.from(allBaseProps).sort((a, b) => {
                var idxA = priority.indexOf(a);
                var idxB = priority.indexOf(b);
                if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                if (idxA !== -1) return -1;
                if (idxB !== -1) return 1;
                return a.localeCompare(b);
            });

            sortedProps.forEach(prop => {
                var id = 'toggle-' + safePropName(prop);
                // Default active states: user wants all displayed
                var isActive = true;
                togglePropertyView(prop, isActive); // apply initial state

                var label = $('<label class="prop-toggle ' + (isActive ? 'active' : '') + '" for="' + id + '"></label>');
                var cb = $('<input type="checkbox" id="' + id + '" ' + (isActive ? 'checked' : '') + '>');

                cb.on('change', function () {
                    var isChecked = $(this).is(':checked');
                    if (isChecked) label.addClass('active'); else label.removeClass('active');
                    togglePropertyView(prop, isChecked);
                });

                label.append(cb).append(prop);
                container.append(label);
            });
        }

        function extractGroups(row) {
            let groups = { main: {}, comps: {} };
            Object.keys(row).forEach(k => {
                let match = k.match(/^(\d+)(.*)$/);
                if (match) {
                    let prefix = match[1];
                    let prop = match[2] || '相似度'; // Some files might just have '0' representing something, fallback
                    if (k.endsWith('相似度')) prop = '相似度';
                    if (k.endsWith('匹配')) prop = '匹配';
                    if (!groups.comps[prefix]) groups.comps[prefix] = {};
                    groups.comps[prefix][prop] = row[k];
                    allBaseProps.add(prop);
                } else {
                    groups.main[k] = row[k];
                    allBaseProps.add(k);
                }
            });
            // Ensure similarities exist as base props
            allBaseProps.add("相似度");
            allBaseProps.add("匹配");
            return groups;
        }

        function formatValue(prop, val, mainPrice = null) {
            if (val === null || val === undefined || val === '') return '-';

            if (prop.includes('图链') || (typeof val === 'string' && val.startsWith('http'))) {
                return '<div class="img-container"><img class="product-img" src="' + val + '" onerror="this.src=\'https://via.placeholder.com/150?text=No+Img\'"/></div>';
            }
            if (prop.includes('相似度')) {
                var pct = Math.round(parseFloat(val) * 100);
                return '<span class="similarity-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ' + pct + '%</span>';
            }
            if (prop.includes('价')) {
                let html = '¥' + parseFloat(val).toFixed(2);
                if (mainPrice !== null) {
                    let diff = parseFloat(val) - parseFloat(mainPrice);
                    if (diff > 0) html += ' <span class="diff-indicator diff-up">+' + diff.toFixed(2) + '</span>';
                    else if (diff < 0) html += ' <span class="diff-indicator diff-down">' + diff.toFixed(2) + '</span>';
                }
                return html;
            }
            return String(val);
        }

        function formatValueWrapper(prop, val, mainPrice, defaultDisplay) {
            // To reuse formatting but without flex containers
            var displayVal = formatValue(prop, val, mainPrice);
            var extraClass = '';
            if (prop.includes('图链')) extraClass = 'img-row';
            else if (prop.includes('名') && !prop.includes('规格')) extraClass = 'title-value';
            else if (prop.includes('价')) extraClass = 'price-value';
            else extraClass = 'prop-value';
            return '<div class="' + extraClass + '">' + displayVal + '</div>';
        }

        function renderRow(data) {
            var groups = extractGroups(data);
            var compKeys = Object.keys(groups.comps).sort((a, b) => parseInt(a) - parseInt(b));

            var html = '<div class="comparison-container">';
            html += '<table class="comparison-table">';

            // Header Row
            html += '<thead><tr>';
            html += '<th class="sticky-col"><span style="color: var(--color-text-muted); font-size: 0.9rem;">比对纬度</span></th>';
            html += '<th class="main-col-header"><div class="role-badge main-badge" style="font-size: 1rem; padding: 8px 16px; border-radius: 12px;">👑 主推商品</div></th>';
            compKeys.forEach(prefix => {
                html += '<th class="comp-header"><div class="role-badge comp-badge" style="font-size: 0.9rem; padding: 6px 12px; border-radius: 10px;">盾 竞品匹配 #' + prefix + '</div></th>';
            });
            html += '</tr></thead>';

            html += '<tbody>';

            var mainPrice = groups.main['活动价'] ? groups.main['活动价'] : null;

            // Priority order for properties (to ensure image/titles are on top)
            var priority = ["主图链接", "菜单名", "活动价", "原价", "规格名", "相似度", "匹配", "销售", "条码", "skuId"];
            var sortedPropsByPriority = Array.from(allBaseProps).sort((a, b) => {
                var idxA = priority.indexOf(a);
                var idxB = priority.indexOf(b);
                if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                if (idxA !== -1) return -1;
                if (idxB !== -1) return 1;
                return a.localeCompare(b);
            });

            sortedPropsByPriority.forEach(prop => {
                var cssClass = safePropName(prop);
                html += '<tr class="' + cssClass + '">';
                html += '<td class="sticky-col">' + prop + '</td>';

                // Main Value
                var mainVal = groups.main[prop];
                html += '<td class="main-col-data">' + (mainVal !== undefined ? formatValueWrapper(prop, mainVal, null, true) : '<div style="color:rgba(0,0,0,0.2);text-align:center;">-</div>') + '</td>';

                // Competitor Values
                compKeys.forEach(prefix => {
                    var compVal = groups.comps[prefix][prop];
                    html += '<td>' + (compVal !== undefined ? formatValueWrapper(prop, compVal, mainPrice, false) : '<div style="color:rgba(0,0,0,0.2);text-align:center;">-</div>') + '</td>';
                });

                html += '</tr>';
            });

            html += '</tbody></table></div>';
            return html;
        }

        function initDataTable(data, isSort = false) {
            if (table) { table.destroy(); }
            if (!isSort) {
                originalData = [...data]; // Save original order
                $('#sortControl').val('default'); // Reset dropdown on new file output
            }
            rawData = data;
            allBaseProps.clear();

            // Single pass to collect all columns/prefixes initially
            if (data.length > 0) {
                var sampleGroups = extractGroups(data[0]);
                // Check all rows for diverse props
                data.forEach(r => extractGroups(r));
            }

            buildColControls();

            table = $('#dataTable').DataTable({
                data: data,
                columns: [{ data: null, render: function (v, t, row) { return t === 'display' ? renderRow(row) : ''; } }],
                pageLength: 20,
                ordering: false, // Turn off sorting since it's a compound row
                language: {
                    search: "全局搜索:",
                    lengthMenu: "每页显示 _MENU_ 组对比",
                    info: "正在查看第 _START_ 至 _END_ 组 / 共计 _TOTAL_ 组竞品",
                    paginate: { first: "首页", last: "末页", next: "下页", previous: "上页" }
                },
                dom: '<"hero-info"f>rt<"hero-info"ip><"clear">',
                drawCallback: function () {
                    $('.product-img').off('mousemove').on('mousemove', function (e) {
                        $('#avg-preview').css({
                            'display': 'block',
                            'top': (e.pageY + 15) + 'px',
                            'left': (e.pageX + 15) + 'px'
                        }).find('img').attr('src', $(this).attr('src'));
                    }).off('mouseleave').on('mouseleave', function () {
                        $('#avg-preview').hide();
                    });
                }
            });
        }

        // --- Upload & Export ---
        $('#uploadBtn').click(function () { $('#uploadInput').click(); });
        $('#uploadInput').change(function () {
            if (this.files.length === 0) return;
            $('#loadingOverlay').css('display', 'flex');
            var file = this.files[0];
            var reader = new FileReader();
            reader.onload = function (e) {
                setTimeout(() => {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, { type: 'array' });
                    var firstSheet = workbook.SheetNames[0];
                    var jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
                    initDataTable(jsonData);
                    $('#loadingOverlay').hide();
                }, 100); // give UI time to show loader
            };
            reader.readAsArrayBuffer(file);
        });

        function exportToExcel(type) {
            if (rawData.length === 0) { alert('暂无可导出数据'); return; }
            $('#loadingOverlay').css('display', 'flex');

            setTimeout(() => {
                var exportData = [];
                // Only export rows currently filtered by DataTables
                var filteredData = table.rows({ search: 'applied' }).data().toArray();

                filteredData.forEach(row => {
                    if (type === 'all') {
                        exportData.push(row);
                    } else if (type === 'comps_only') {
                        var newRow = {};
                        // Only include columns that are numbers or prefixes
                        Object.keys(row).forEach(k => {
                            if (k.match(/^(\d+)(.*)$/) || k === 'skuId' || k === '菜单名') newRow[k] = row[k];
                        });
                        exportData.push(newRow);
                    }
                });

                var ws = XLSX.utils.json_to_sheet(exportData);
                var wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "竞品比对结果");
                XLSX.writeFile(wb, "Multi_Compare_Results_" + new Date().getTime() + ".xlsx");
                $('#loadingOverlay').hide();
            }, 100);
        }

        // Sort Control Implementation
        $('#sortControl').change(function () {
            if (!originalData || originalData.length === 0) return;
            var val = $(this).val();
            var sortedData = [...originalData];

            function getMaxSim(row) {
                var maxSim = -1;
                Object.keys(row).forEach(k => {
                    if (k.match(/^\d+/) && (k.endsWith('相似度') || k.endsWith('匹配'))) {
                        // try parse float, handle percentage string if any
                        let simStr = String(row[k]).replace('%', '');
                        let simVal = parseFloat(simStr);
                        if (!isNaN(simVal) && simVal > maxSim) maxSim = simVal;
                    }
                });
                return maxSim;
            }

            function getCompCount(row) {
                var prefixes = new Set();
                Object.keys(row).forEach(k => {
                    let match = k.match(/^(\d+)(.*)$/);
                    if (match) prefixes.add(match[1]);
                });
                return prefixes.size;
            }

            if (val === 'default') {
                sortedData = [...originalData];
            } else if (val === 'price_asc') {
                sortedData.sort((a, b) => (parseFloat(a['活动价']) || 0) - (parseFloat(b['活动价']) || 0));
            } else if (val === 'price_desc') {
                sortedData.sort((a, b) => (parseFloat(b['活动价']) || 0) - (parseFloat(a['活动价']) || 0));
            } else if (val === 'sim_desc') {
                sortedData.sort((a, b) => getMaxSim(b) - getMaxSim(a));
            } else if (val === 'sim_asc') {
                sortedData.sort((a, b) => getMaxSim(a) - getMaxSim(b));
            } else if (val === 'comp_desc') {
                sortedData.sort((a, b) => getCompCount(b) - getCompCount(a));
            }

            initDataTable(sortedData, true);
        });

        // Auto-load if sample data exists (for dev/testing)
        $(document).ready(function () {
            if (typeof initialData !== 'undefined' && initialData.length > 0) {
                initDataTable(initialData);
            }
        });
    </script>
</body>
